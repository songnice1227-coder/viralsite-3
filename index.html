  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
/* ── Reset & Tokens ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2E7D52;--primary-light:#E8F5EE;--primary-dark:#1F5E3C;
  --accent:#FF6B6B;--bg:#F8F7F4;--surface:#FEFCF9;
  --border:#E0DAD2;--text:#1A1A2E;--text2:#6B6860;--text3:#9E9890;
  --r:8px;--rmd:14px;--t:.16s ease;
  --sh:0 2px 12px rgba(0,0,0,.07);--sh2:0 6px 24px rgba(0,0,0,.10);
}
html{scroll-behavior:smooth}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit}
textarea{resize:vertical}

/* ── Tags ── */
.tag{display:inline-flex;align-items:center;font-size:13px;font-weight:700;
  padding:5px 12px;border-radius:99px}
.tag-startup{background:#EEF2FF;color:#5B5FEF}
.tag-intern{background:#E8FFF3;color:#1DAF5F}
.tag-parttime{background:#FFF8E8;color:#E8960A}
.tag-contest{background:#FFF0F0;color:#EF5B5B}
.tag-exp{background:#F4F0FF;color:#8B5FEF}

/* ── Nav ── */
/* ── Admin Page ── */
.admin-wrap{max-width:900px;margin:0 auto;padding:36px 24px 60px}
.admin-wrap h2{font-size:24px;font-weight:800;margin-bottom:4px}
.admin-sub{font-size:15px;color:var(--text3);margin-bottom:32px}
.admin-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--rmd);padding:24px;margin-bottom:24px}
.admin-section h3{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--text)}
.admin-opp-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.admin-opp-row:last-child{border-bottom:none}
.admin-opp-info{flex:1}
.admin-opp-title{font-size:15px;font-weight:700;color:var(--text)}
.admin-opp-meta{font-size:13px;color:var(--text3);margin-top:2px}
.admin-opp-expired{color:var(--accent);font-weight:700}
.admin-del-btn{padding:6px 14px;border:1.5px solid var(--accent);color:var(--accent);border-radius:var(--r);font-size:14px;font-weight:700;transition:all var(--t);flex-shrink:0}
.admin-del-btn:hover{background:var(--accent);color:#fff}
.admin-form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.admin-form .full{grid-column:1/-1}
.admin-field label{display:block;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:4px}
.admin-field input,.admin-field select,.admin-field textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:15px;outline:none;transition:border-color var(--t);color:var(--text)}
.admin-field input:focus,.admin-field select:focus,.admin-field textarea:focus{border-color:var(--primary)}
.admin-add-btn{margin-top:16px;padding:12px 28px;background:var(--primary);color:#fff;border-radius:var(--r);font-size:16px;font-weight:700;transition:background var(--t)}
.admin-add-btn:hover{background:var(--primary-dark)}
.admin-add-btn:disabled{opacity:.5;cursor:not-allowed}
.admin-msg{font-size:14px;margin-top:10px;font-weight:600}
.admin-msg.ok{color:var(--primary)}.admin-msg.err{color:var(--accent)}
.nav-admin{font-size:14px;padding:6px 14px;border:1.5px solid var(--primary);color:var(--primary);border-radius:var(--r);font-weight:700;transition:all var(--t);margin-right:4px}
.nav-admin:hover{background:var(--primary);color:#fff}

/* ── Login Page ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:48px 40px;width:100%;max-width:400px;box-shadow:var(--sh2);text-align:center}
.login-logo{display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:24px;font-weight:800;color:var(--primary);margin-bottom:8px}
.login-logo span{color:var(--text)}
.login-tagline{font-size:15px;color:var(--text3);margin-bottom:36px;line-height:1.6}
.login-label{font-size:14px;font-weight:700;color:var(--text2);text-align:left;
  display:block;margin-bottom:6px;letter-spacing:.02em}
.login-input{width:100%;border:1.5px solid var(--border);border-radius:var(--r);
  padding:14px 16px;font-size:17px;outline:none;transition:border-color var(--t),box-shadow var(--t);
  color:var(--text);background:var(--bg);text-align:center;letter-spacing:.04em}
.login-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(46,125,82,.12)}
.login-btn{width:100%;margin-top:16px;padding:15px;background:var(--primary);color:#fff;
  border-radius:var(--r);font-size:17px;font-weight:700;transition:background var(--t),transform .1s}
.login-btn:hover{background:var(--primary-dark)}
.login-btn:active{transform:scale(.98)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-hint{font-size:13px;color:var(--text3);margin-top:14px;line-height:1.6}
.login-err{font-size:14px;color:var(--accent);margin-top:10px;font-weight:600}
.nav-user{display:flex;align-items:center;gap:8px;margin-left:auto}
.nav-user-name{font-size:15px;font-weight:600;color:var(--text2)}
.nav-logout{font-size:14px;padding:6px 14px;border:1.5px solid var(--border);
  border-radius:var(--r);color:var(--text3);transition:all var(--t)}
.nav-logout:hover{border-color:var(--accent);color:var(--accent)}
/* ── 기능 안내 모달 ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.feature-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease;}
.feature-modal{background:var(--surface);border-radius:20px;padding:32px 28px 24px;max-width:420px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.18);position:relative;animation:slideUp .25s ease;}
.feature-modal-badge{display:inline-flex;align-items:center;gap:5px;background:var(--primary-light);color:var(--primary);font-size:12px;font-weight:800;padding:4px 11px;border-radius:99px;margin-bottom:14px;letter-spacing:.02em;}
.feature-modal-title{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.4px;margin-bottom:6px;}
.feature-modal-sub{font-size:14px;color:var(--text2);margin-bottom:22px;line-height:1.6;}
.feature-modal-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.feature-modal-item{display:flex;align-items:flex-start;gap:12px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rmd);padding:13px 15px;}
.feature-modal-item-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.feature-modal-item-body{}
.feature-modal-item-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.feature-modal-item-desc{font-size:13px;color:var(--text2);line-height:1.55;}
.feature-modal-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border-radius:var(--r);font-size:15px;font-weight:700;transition:background var(--t);}
.feature-modal-btn:hover{background:var(--primary-dark);}
.feature-modal-close{position:absolute;top:16px;right:18px;font-size:20px;color:var(--text3);line-height:1;}
/* ── 마감 임박 배너 ── */
.deadline-banner{background:#FFF8E8;border-bottom:1.5px solid #FFE0A0;padding:10px 40px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.deadline-banner-icon{font-size:16px;flex-shrink:0;}
.deadline-banner-text{font-size:14px;font-weight:600;color:#A0600A;flex:1;}
.deadline-banner-items{display:flex;flex-wrap:wrap;gap:6px;}
.deadline-banner-item{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #FFD580;border-radius:99px;padding:4px 12px;font-size:13px;font-weight:600;color:#7A4A00;cursor:pointer;transition:background var(--t);}
.deadline-banner-item:hover{background:#FFF3D0;}
.deadline-banner-item .dday{color:#E8960A;font-weight:800;}
.deadline-banner-close{margin-left:auto;font-size:18px;color:#C0A060;padding:0 4px;flex-shrink:0;line-height:1;}
/* ── 크레딧 안내 배너 ── */
.credit-banner{position:sticky;top:58px;z-index:190;background:linear-gradient(90deg,#F0F4FF,#EEF2FF);border-bottom:1.5px solid #C7D2FE;padding:12px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.credit-banner-icon{font-size:18px;flex-shrink:0;}
.credit-banner-body{flex:1;min-width:0;}
.credit-banner-title{font-size:14px;font-weight:800;color:#3730A3;margin-bottom:2px;}
.credit-banner-desc{font-size:13px;color:#4338CA;line-height:1.55;}
.credit-banner-count{display:inline-flex;align-items:center;gap:4px;background:#4F46E5;color:#fff;border-radius:99px;padding:2px 10px;font-size:12px;font-weight:800;margin:0 3px;}
.credit-banner-close{font-size:18px;color:#818CF8;padding:0 4px;flex-shrink:0;line-height:1;}

nav{position:sticky;top:0;z-index:200;height:58px;background:rgba(254,252,249,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 40px;gap:0}
.nav-logo{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--primary);
  cursor:pointer;display:flex;align-items:center;gap:5px;margin-right:28px}
.nav-logo span{color:var(--text)}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-btn{padding:9px 18px;border-radius:var(--r);font-size:16px;font-weight:500;
  color:var(--text2);transition:all var(--t);position:relative}
.nav-btn:hover,.nav-btn.active{background:var(--primary-light);color:var(--primary)}
.nav-badge{position:absolute;top:2px;right:2px;background:var(--accent);color:#fff;
  font-size:11px;font-weight:800;padding:2px 6px;border-radius:99px;min-width:18px;text-align:center}

/* ── Hero ── */
.hero{background:linear-gradient(135deg,#5B5FEF,#8B5FEF 60%,#B45FEF);
  padding:68px 40px 56px;color:#fff;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 80% 20%,rgba(255,255,255,.05) 0%,transparent 50%)}
.hero-eyebrow{display:inline-block;background:rgba(255,255,255,.18);color:rgba(255,255,255,.9);
  font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:6px 16px;border-radius:99px;margin-bottom:16px}
.hero h1{font-size:40px;font-weight:800;line-height:1.25;letter-spacing:-1px;margin-bottom:12px}
.hero h1 em{font-style:normal;color:#FFE76B}
.hero p{font-size:17px;color:rgba(255,255,255,.8);max-width:460px;margin:0 auto 28px}
.hero-search{display:flex;align-items:center;background:#fff;border-radius:50px;
  padding:6px 6px 6px 20px;max-width:480px;margin:0 auto;
  box-shadow:0 4px 24px rgba(0,0,0,.15)}
.hero-search input{flex:1;border:none;outline:none;font-size:16px;color:var(--text);background:transparent}
.hero-search input::placeholder{color:var(--text3)}
.hero-search button{background:var(--primary);color:#fff;padding:10px 23px;border-radius:40px;
  font-size:15px;font-weight:600;transition:background var(--t)}
.hero-search button:hover{background:var(--primary-dark)}
.hero-stats{display:flex;justify-content:center;gap:28px;margin-top:28px}
.hero-stat strong{display:block;font-size:22px;font-weight:800}
.hero-stat span{font-size:13px;color:rgba(255,255,255,.7)}

/* ── Section ── */
.section{padding:44px 40px}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px}
.section-title{font-size:22px;font-weight:700;letter-spacing:-.3px}
.section-link{font-size:15px;color:var(--primary);font-weight:600;cursor:pointer}
.section-link:hover{text-decoration:underline}

/* ── Category Grid ── */
.category-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.category-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rmd);
  padding:18px 14px;text-align:center;cursor:pointer;transition:all var(--t);
  display:flex;flex-direction:column;align-items:center;gap:8px}
.category-btn:hover,.category-btn.active{border-color:var(--primary);background:var(--primary-light);
  box-shadow:var(--sh2);transform:translateY(-2px)}
.category-icon{font-size:28px}
.category-label{font-size:15px;font-weight:700;color:var(--text)}
.category-count{font-size:13px;color:var(--text3)}

/* ── Cards ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.opp-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rmd);
  padding:20px;cursor:pointer;transition:all var(--t);display:flex;flex-direction:column}
.opp-card:hover{border-color:var(--primary);box-shadow:var(--sh2);transform:translateY(-2px)}
.opp-card.is-saved{border-color:var(--primary)}
.card-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-top-left{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.card-bm{width:30px;height:30px;border-radius:var(--r);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text3);
  transition:all var(--t);flex-shrink:0}
.card-bm:hover{border-color:var(--primary);background:var(--primary-light)}
.card-bm.saved{border-color:var(--primary);background:var(--primary);color:#fff}
.card-company-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.card-company{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.03em}
.card-title{font-size:17px;font-weight:700;line-height:1.35;letter-spacing:-.02em;margin-bottom:10px}
.card-desc{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:14px;flex:1}
.card-divider{height:1px;background:var(--border);margin-bottom:12px}
.card-meta-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.meta-pill{display:inline-flex;align-items:center;gap:3px;font-size:13px;color:var(--text2);
  background:var(--bg);padding:4px 10px;border-radius:5px;font-weight:500}
.meta-pill.urgent{background:#FFF1F1;color:var(--accent);font-weight:700}
.diff-bar{display:flex;gap:2px;align-items:center}
.diff-seg{width:9px;height:3px;border-radius:2px;background:var(--border)}
.diff-seg.on{background:var(--primary)}

/* ── Badges ── */
.badge-new{display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;background:var(--accent);color:#fff;
  padding:0 9px;height:22px;border-radius:99px;letter-spacing:.04em;line-height:1;box-sizing:border-box}
.badge-grade{display:inline-flex;align-items:center;font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:99px;background:#EAF4FF;color:#2A7ACC;border:1px solid #B8D9F7;}
.badge-grade.all{background:#F0FAF4;color:#2E7D52;border-color:#B2DCC6;}
.grade-filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:10px 0 4px;}
.grade-filter-label{font-size:13px;font-weight:700;color:var(--text3);margin-right:2px;}
.grade-chip{display:inline-flex;align-items:center;gap:4px;font-size:14px;font-weight:700;
  padding:6px 15px;border-radius:99px;border:1.5px solid var(--border);color:var(--text2);
  background:var(--surface);cursor:pointer;transition:all var(--t);}
.grade-chip:hover{border-color:var(--primary);color:var(--primary);}
.grade-chip.on{background:var(--primary);color:#fff;border-color:var(--primary);}
.badge-recommend{font-size:11px;font-weight:700;background:var(--primary);color:#fff;
  padding:3px 9px;border-radius:99px}
.badge-noportfolio{font-size:11px;font-weight:700;background:#E8FFF3;color:#1DAF5F;
  padding:3px 9px;border-radius:99px}
.badge-progress{font-size:11px;font-weight:700;background:#FFF8E8;color:#E8960A;
  padding:3px 9px;border-radius:99px}
.badge-archived{font-size:11px;font-weight:700;background:#E8FFF3;color:#1DAF5F;
  padding:3px 9px;border-radius:99px}

/* ── Filters ── */
.filter-bar{display:flex;align-items:center;gap:8px;padding:14px 40px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-label{font-size:14px;font-weight:700;color:var(--text2)}
.filter-select,.filter-sel{border:1.5px solid var(--border);border-radius:var(--r);
  padding:7px 12px;font-size:14px;color:var(--text);background:var(--surface);outline:none;cursor:pointer}
.filter-chip{padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);
  font-size:14px;color:var(--text2);background:var(--surface);cursor:pointer;transition:all var(--t)}
.filter-chip:hover,.filter-chip.on{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.filter-count{font-size:14px;color:var(--text3);margin-left:auto;font-weight:600}
.no-results{text-align:center;padding:60px 20px;color:var(--text3);font-size:16px}
.no-results-title{font-size:17px;font-weight:700;color:var(--text2);margin-bottom:8px}
.no-results-sub{font-size:15px;color:var(--text3);margin-bottom:24px}
.external-search-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.external-search-btn{display:inline-flex;align-items:center;gap:7px;padding:12px 20px;border-radius:10px;
  font-size:15px;font-weight:700;border:1.5px solid var(--border);color:var(--text2);background:var(--surface);
  cursor:pointer;transition:all var(--t);text-decoration:none}
.external-search-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.external-search-btn .ext-icon{font-size:18px}

/* ── Detail ── */
.detail-wrap{max-width:760px;margin:0 auto;padding:36px 40px 80px}
.detail-back{display:inline-flex;align-items:center;gap:6px;font-size:15px;color:#fff;
  cursor:pointer;margin-bottom:26px;padding:9px 16px;border:1.5px solid var(--primary);
  background:var(--primary);border-radius:var(--r);transition:all var(--t);font-weight:600}
.detail-back:hover{background:var(--primary-dark,#1f6640);border-color:var(--primary-dark,#1f6640);color:#fff}
.detail-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.detail-co{font-size:14px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.detail-h1{font-size:30px;font-weight:800;letter-spacing:-.7px;line-height:1.25;margin-bottom:12px}
.detail-why{font-size:15px;color:var(--primary);font-weight:600;margin-bottom:22px;
  padding:11px 15px;background:var(--primary-light);border-radius:var(--r);
  border-left:3px solid var(--primary);line-height:1.6}
.detail-meta-strip{display:flex;flex-wrap:wrap;gap:7px;padding:16px 0;
  border-top:1.5px solid var(--border);border-bottom:1.5px solid var(--border);margin-bottom:28px}
.dmeta{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:600;color:var(--text2);
  padding:5px 12px;background:var(--bg);border-radius:var(--r);border:1px solid var(--border)}
.detail-section{margin-bottom:24px}
.detail-section-title{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text3);margin-bottom:11px;display:flex;align-items:center;gap:8px}
.detail-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.detail-text{font-size:15px;color:var(--text2);line-height:1.8}
.forWho-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.forWho-list li{font-size:15px;color:var(--text2);display:flex;align-items:flex-start;gap:7px;padding:5px 0}
.forWho-list li::before{content:'✓';color:var(--primary);font-weight:700;flex-shrink:0}
.prep-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.prep-list li{display:flex;align-items:flex-start;gap:9px;font-size:15px;color:var(--text2);
  padding:10px 14px;background:var(--bg);border-radius:var(--r);border:1px solid var(--border)}
.prep-check{width:18px;height:18px;border-radius:3px;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;background:#fff}
.pv-box{background:var(--primary-light);border:1.5px solid var(--border);
  border-radius:var(--rmd);padding:16px 18px;margin-bottom:8px}
.pv-box-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:8px;letter-spacing:.03em}
.pv-box-text{font-size:15px;color:var(--text2);line-height:1.7;margin-bottom:10px}
.skill-chip{display:inline-flex;font-size:13px;font-weight:600;background:#fff;color:var(--primary);
  padding:4px 11px;border-radius:99px;border:1.5px solid var(--primary);margin:2px}
.pf-badge{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:700;
  padding:9px 17px;border-radius:var(--r)}
.pf-required{background:#FFF0F0;color:#EF5B5B;border:1.5px solid #FFD4D4}
.pf-optional{background:#E8F5EE;color:#2E7D52;border:1.5px solid #B8DECA}
.pf-none{background:#E8FFF3;color:#1DAF5F;border:1.5px solid #B3EDD0}
.detail-cta{display:flex;gap:10px;align-items:center;padding:20px;
  background:var(--primary-light);border-radius:var(--rmd);border:1.5px solid var(--border);flex-wrap:wrap}
.btn-apply{flex:1;min-width:160px;background:var(--primary);color:#fff;padding:14px 23px;
  border-radius:var(--r);font-size:16px;font-weight:700;text-align:center;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:background var(--t)}
.btn-apply:hover{background:var(--primary-dark)}
.btn-secondary{padding:13px 18px;border-radius:var(--r);border:1.5px solid var(--border);
  background:#fff;font-size:15px;font-weight:600;color:var(--text2);transition:all var(--t)}
.btn-secondary:hover,.btn-secondary.saved{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.btn-start{padding:13px 20px;border-radius:var(--r);background:var(--text);color:#fff;
  font-size:15px;font-weight:700;transition:background var(--t)}
.btn-start:hover{background:#333}
.similar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sim-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);
  padding:14px;cursor:pointer;transition:all var(--t)}
.sim-card:hover{border-color:var(--primary);box-shadow:var(--sh);transform:translateY(-2px)}
.sim-title{font-size:15px;font-weight:700;margin-top:7px;letter-spacing:-.02em}
.sim-co{font-size:12px;color:var(--text3);margin-top:3px;text-transform:uppercase;font-weight:600}

/* ── MyPage ── */
.mypage-top{padding:36px 40px 0;background:linear-gradient(160deg, #C8DFC1 0%, #D8EACF 50%, #C4DDB9 100%);border-bottom:1px solid var(--border)}
.mypage-top h2{font-size:26px;font-weight:800;letter-spacing:-.5px}
.mypage-top p{font-size:15px;color:var(--text2);margin-top:5px}
.mypage-tabs{display:flex;gap:0;margin-top:18px}
.mp-tab{padding:12px 20px;font-size:15px;font-weight:600;color:var(--text3);cursor:pointer;
  border-bottom:2px solid transparent;transition:all var(--t);display:flex;align-items:center;gap:6px}
.mp-tab:hover{color:var(--text)}
.mp-tab.active{color:var(--primary);border-color:var(--primary)}
.tab-count{background:var(--primary);color:#fff;font-size:11px;font-weight:800;
  padding:2px 7px;border-radius:99px;min-width:18px;text-align:center}
.mypage-body{padding:24px 40px 60px;background:linear-gradient(180deg,#D8EACF 0%,#E4F0DC 100%);min-height:60vh}
/* ── 메모장 ── */
.memo-pad{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rmd);padding:20px;margin-bottom:28px;}
.memo-pad-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.memo-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.memo-item{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.memo-item-date{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:5px;letter-spacing:.03em;}
.memo-item-text{font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap;word-break:break-all;}
.memo-item-actions{float:right;display:flex;gap:4px;}
.memo-item-del,.memo-item-edit{font-size:12px;color:var(--text3);padding:2px 6px;border-radius:4px;transition:color var(--t);}
.memo-item-del:hover{color:var(--accent);}
.memo-item-edit:hover{color:var(--primary);}
.memo-item-editing textarea{width:100%;border:1.5px solid var(--primary);border-radius:var(--r);padding:10px 12px;font-size:14px;color:var(--text);background:var(--bg);outline:none;line-height:1.7;resize:none;margin-top:6px;}
.memo-item-edit-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:6px;}
.memo-edit-save{padding:5px 14px;background:var(--primary);color:#fff;border-radius:var(--r);font-size:13px;font-weight:700;}
.memo-edit-cancel{padding:5px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;font-weight:700;color:var(--text2);}
.memo-input-wrap{display:flex;flex-direction:column;gap:8px;}
.memo-input-wrap textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;font-size:14px;color:var(--text);background:var(--bg);outline:none;line-height:1.7;transition:border-color var(--t);resize:none;}
.memo-input-wrap textarea:focus{border-color:var(--primary);}
.memo-submit{align-self:flex-end;padding:8px 20px;background:var(--primary);color:#fff;border-radius:var(--r);font-size:14px;font-weight:700;transition:background var(--t);}
.memo-submit:hover{background:var(--primary-dark);}
.memo-submit:disabled{opacity:.45;cursor:not-allowed;}
.memo-empty{font-size:13px;color:var(--text3);padding:8px 0;}
/* ── 프로필 카드 ── */
.profile-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rmd);padding:20px;margin-bottom:20px;}
.profile-card-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:0;}
.profile-card-header.open{margin-bottom:18px;}
.profile-card-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;}
.profile-card-toggle{font-size:13px;color:var(--text3);font-weight:600;}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.profile-field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px;letter-spacing:.02em;}
.profile-field select{width:100%;border:1.5px solid var(--border);border-radius:var(--r);padding:8px 10px;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color var(--t);}
.profile-field select:focus{border-color:var(--primary);}
.profile-complete{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--primary);font-weight:600;margin-top:12px;}
/* ── 비교 랭킹 뷰 ── */
.rank-section{background:linear-gradient(135deg,#1F5E3C,#2E7D52);border-radius:var(--rmd);padding:20px;margin-bottom:20px;}
.rank-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r);background:rgba(255,255,255,.1);margin-bottom:8px;cursor:pointer;transition:background .15s;}
.rank-row:hover{background:rgba(255,255,255,.18);}
.rank-row:last-child{margin-bottom:0;}
.rank-num{min-width:26px;height:26px;border-radius:99px;padding:0 7px;background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:-.3px;}
.rank-num.top{background:#FFE76B;color:#1A1A2E;}
.rank-num.tied{background:rgba(255,231,107,.25);color:#FFE76B;border:1.5px solid rgba(255,231,107,.5);font-size:11px;letter-spacing:-.4px;}
.rank-info{flex:1;min-width:0;}
.rank-name{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-company{font-size:12px;color:rgba(255,255,255,.65);margin-top:1px;}
.rank-bar-wrap{width:100px;flex-shrink:0;}
.rank-bar-bg{height:6px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden;}
.rank-bar-fill{height:100%;border-radius:3px;background:#FFE76B;transition:width .6s ease;}
.rank-pct{font-size:13px;font-weight:800;color:#FFE76B;text-align:right;margin-top:3px;}
/* ── 매칭 바 (카드 내) ── */
.match-bar-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.match-bar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.match-label{font-size:12px;font-weight:700;color:var(--text2);}
.match-pct{font-size:13px;font-weight:800;}
.match-pct.high{color:#2E7D52;}.match-pct.mid{color:#E8960A;}.match-pct.low{color:var(--accent);}
.match-bg{height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
.match-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.match-fill.high{background:#2E7D52;}.match-fill.mid{background:#E8960A;}.match-fill.low{background:var(--accent);}
.match-reasons{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.match-tag{font-size:11px;font-weight:600;background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:99px;}
.no-profile-hint{font-size:13px;color:var(--text3);padding:10px 0 2px;}
/* ── 툴 칩 ── */
.tool-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.tool-chip{padding:6px 13px;border-radius:99px;border:1.5px solid var(--border);font-size:13px;font-weight:600;color:var(--text2);background:var(--surface);cursor:pointer;transition:all var(--t);}
.tool-chip:hover{border-color:var(--primary);color:var(--primary);}
.tool-chip.on{background:var(--primary);color:#fff;border-color:var(--primary);}
.profile-field.full{grid-column:1/-1;}
/* ── 분析하기 탭 ── */
.analysis-wrap{display:flex;flex-direction:column;gap:20px;}
.analysis-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rmd);padding:22px;}
.analysis-section-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.analysis-opp-list{display:flex;flex-direction:column;gap:8px;}
.analysis-opp-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all var(--t);}
.analysis-opp-row:hover{border-color:var(--primary);background:var(--primary-light);}
.analysis-opp-row.selected{border-color:var(--primary);background:var(--primary-light);}
.analysis-opp-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t);}
.analysis-opp-row.selected .analysis-opp-check{background:var(--primary);border-color:var(--primary);color:#fff;font-size:12px;font-weight:800;}
.analysis-opp-info{flex:1;min-width:0;}
.analysis-opp-title{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.analysis-opp-meta{font-size:12px;color:var(--text3);margin-top:2px;}
.analysis-run-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border-radius:var(--r);font-size:16px;font-weight:700;transition:background var(--t);margin-top:4px;}
.analysis-run-btn:hover{background:var(--primary-dark);}
.analysis-run-btn:disabled{opacity:.4;cursor:not-allowed;}
/* ── 분석 결과 ── */
.result-back{display:inline-flex;align-items:center;gap:5px;font-size:14px;color:var(--text2);font-weight:600;cursor:pointer;margin-bottom:20px;padding:7px 14px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);transition:all var(--t);}
.result-back:hover{border-color:var(--primary);color:var(--primary);}
.analysis-ai-btn{width:100%;margin-top:8px;padding:13px;background:linear-gradient(90deg,#4F46E5,#7C3AED);color:#fff;border-radius:var(--r);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity var(--t);}
.analysis-ai-btn:hover{opacity:.88;}
/* ── 프리미엄 안내 모달 ── */
.premium-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease;}
.premium-modal{background:var(--surface);border-radius:20px;padding:32px 28px 28px;max-width:380px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.18);position:relative;text-align:center;animation:slideUp .25s ease;}
.premium-modal-icon{font-size:40px;margin-bottom:12px;}
.premium-modal-badge{display:inline-flex;align-items:center;gap:5px;background:#EEF2FF;color:#4F46E5;font-size:12px;font-weight:800;padding:4px 11px;border-radius:99px;margin-bottom:14px;}
.premium-modal-title{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.4px;margin-bottom:8px;}
.premium-modal-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px;}
.premium-modal-features{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;text-align:left;}
.premium-modal-feature{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text2);}
.premium-modal-feature span{color:#4F46E5;font-weight:700;}
.premium-modal-close-btn{width:100%;padding:12px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;font-weight:700;color:var(--text2);}
.premium-modal-close-btn:hover{border-color:var(--primary);color:var(--primary);}
.result-compare{background:linear-gradient(135deg,#1F5E3C,#2E7D52);border-radius:var(--rmd);padding:20px;margin-bottom:20px;}
.result-compare-title{font-size:15px;font-weight:800;color:#fff;margin-bottom:14px;}
.result-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rmd);padding:22px;margin-bottom:16px;}
.result-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;}
.result-card-info{flex:1;}
.result-card-title{font-size:17px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:4px;}
.result-card-co{font-size:13px;color:var(--text3);font-weight:600;}
.result-score-circle{width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:3px solid;}
.result-score-circle.high{border-color:#2E7D52;background:#E8F5EE;color:#2E7D52;}
.result-score-circle.mid{border-color:#E8960A;background:#FFF8E8;color:#E8960A;}
.result-score-circle.low{border-color:var(--accent);background:#FFF0F0;color:var(--accent);}
.result-score-num{font-size:22px;font-weight:800;line-height:1;}
.result-score-label{font-size:10px;font-weight:700;opacity:.75;}
.result-bar-wrap{margin-bottom:18px;}
.result-bar-label{display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px;}
.result-bar-bg{height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.result-bar-fill{height:100%;border-radius:5px;transition:width .8s ease;}
.result-bar-fill.high{background:#2E7D52;}.result-bar-fill.mid{background:#E8960A;}.result-bar-fill.low{background:var(--accent);}
.result-table{width:100%;border-collapse:collapse;font-size:14px;}
.result-table th{text-align:left;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;padding:0 0 8px;border-bottom:1.5px solid var(--border);}
.result-table td{padding:10px 0;border-bottom:1px solid var(--border);vertical-align:middle;}
.result-table tr:last-child td{border-bottom:none;}
.result-criterion-label{font-weight:600;color:var(--text2);}
.result-criterion-icon{font-size:16px;text-align:center;}
.result-criterion-score{font-weight:800;font-size:13px;}
.result-criterion-score.hit{color:#2E7D52;}.result-criterion-score.miss{color:var(--accent);}
.result-criterion-reason{color:var(--text2);font-size:13px;}
.result-summary{padding:14px 16px;border-radius:var(--r);font-size:14px;line-height:1.7;margin-top:14px;}
.result-summary.high{background:#E8F5EE;color:#1F5E3C;border-left:3px solid #2E7D52;}
.result-summary.mid{background:#FFF8E8;color:#8A5A00;border-left:3px solid #E8960A;}
.result-summary.low{background:#FFF0F0;color:#C0392B;border-left:3px solid var(--accent);}
.my-empty{text-align:center;padding:64px 20px;color:var(--text3)}
.my-empty-icon{font-size:36px;margin-bottom:12px}
.my-empty p{font-size:16px;margin-bottom:18px}
.btn-go{background:var(--primary);color:#fff;padding:10px 23px;border-radius:var(--r);
  font-size:15px;font-weight:700;transition:background var(--t)}
.btn-go:hover{background:var(--primary-dark)}

/* ── Saved / In-Progress cards ── */
.my-card-list{display:flex;flex-direction:column;gap:0;
  border:1.5px solid var(--border);border-radius:var(--rmd);overflow:hidden}
.my-card-item{background:#fff;border-bottom:1px solid var(--border);
  padding:18px 22px;transition:background var(--t)}
.my-card-item:last-child{border-bottom:none}
.my-card-item:hover{background:var(--bg)}
.mci-top{display:flex;align-items:flex-start;gap:12px}
.mci-body{flex:1;cursor:pointer}
.mci-eyebrow{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.mci-title{font-size:17px;font-weight:700;letter-spacing:-.025em}
.mci-sub{font-size:12px;color:var(--text3);margin-top:2px;text-transform:uppercase;font-weight:600;letter-spacing:.04em}
.mci-desc{font-size:14px;color:var(--text2);margin-top:5px;line-height:1.5}
.mci-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.mci-actions{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
.mci-btn{padding:6px 14px;border-radius:var(--r);font-size:13px;font-weight:700;
  border:1.5px solid var(--border);color:var(--text2);background:#fff;transition:all var(--t)}
.mci-btn:hover{border-color:var(--primary);color:var(--primary)}
.mci-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.mci-btn.primary:hover{background:var(--primary-dark)}
.mci-btn.danger{border-color:#FFD4D4;color:var(--accent)}
.mci-btn.danger:hover{background:#FFF0F0}
.prog-bar-sm{height:3px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:8px}
.prog-fill-sm{height:100%;background:var(--primary);border-radius:99px;transition:width .4s ease}
.prog-label{font-size:12px;color:var(--text3);margin-top:3px;font-weight:600}
.unsave-btn{color:var(--text3);font-size:17px;padding:3px;transition:color var(--t);font-weight:700;flex-shrink:0}
.unsave-btn:hover{color:var(--accent)}

/* ── Project Detail ── */
.pd-wrap{max-width:760px;margin:0 auto;padding:36px 40px 80px}
.pd-opp-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.pd-co{font-size:13px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.pd-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.pd-meta{display:flex;gap:12px;font-size:14px;color:var(--text3);margin-bottom:28px;flex-wrap:wrap}
.pd-section{margin-bottom:28px;background:#fff;border:1.5px solid var(--border);
  border-radius:var(--rmd);padding:20px}
.pd-section-title{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.pd-section-title::after{content:'';flex:1;height:1px;background:var(--border)}


/* Steps */
.step-prog-wrap{margin-bottom:14px}
.step-prog-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:5px}
.step-prog-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .4s ease}
.step-prog-text{font-size:13px;color:var(--text3);font-weight:600}
.steps-list{display:flex;flex-direction:column;gap:7px}
.step-item{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--bg);border-radius:var(--r);border:1.5px solid var(--border);
  cursor:pointer;transition:all var(--t);user-select:none}
.step-item:hover{border-color:var(--primary)}
.step-item.done{background:var(--primary-light);border-color:var(--primary)}
.step-num{width:25px;height:25px;border-radius:50%;background:var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
  color:var(--text3);flex-shrink:0;transition:all var(--t)}
.step-item.done .step-num{background:var(--primary);color:#fff}
.step-label{flex:1;font-size:15px;font-weight:500;color:var(--text2)}
.step-item.done .step-label{color:var(--primary);font-weight:600}
.step-check{font-size:14px;color:var(--primary)}
.step-item.archived{cursor:default}
.step-item.archived:hover{border-color:var(--border)}

/* Checklist */
.add-row{display:flex;gap:8px;margin-bottom:12px}
.add-row input{flex:1;border:1.5px solid var(--border);border-radius:var(--r);
  padding:10px 14px;font-size:15px;outline:none;transition:border-color var(--t)}
.add-row input:focus{border-color:var(--primary)}
.add-row button{padding:10px 16px;background:var(--primary);color:#fff;border-radius:var(--r);
  font-size:14px;font-weight:700;transition:background var(--t);flex-shrink:0}
.add-row button:hover{background:var(--primary-dark)}
.cl-list{display:flex;flex-direction:column;gap:6px}
.cl-row{display:flex;align-items:center;gap:9px;padding:8px 12px;background:var(--bg);
  border-radius:var(--r);border:1px solid var(--border);transition:all var(--t)}
.cl-row.done .cl-text{text-decoration:line-through;color:var(--text3)}
.cl-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
.cl-text{flex:1;font-size:15px;color:var(--text2)}
.del-btn{color:var(--text3);font-size:16px;font-weight:700;padding:2px 5px;
  transition:color var(--t);flex-shrink:0}
.del-btn:hover{color:var(--accent)}
.empty-hint{font-size:14px;color:var(--text3);text-align:center;padding:14px;
  background:var(--bg);border-radius:var(--r)}

/* Memo */
.memo-add{margin-bottom:12px}
.memo-add textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--r);
  padding:12px 14px;font-size:15px;outline:none;transition:border-color var(--t);
  line-height:1.6;color:var(--text)}
.memo-add textarea:focus{border-color:var(--primary)}
.memo-add-btn{margin-top:6px;padding:8px 18px;background:var(--primary);color:#fff;
  border-radius:var(--r);font-size:14px;font-weight:700;transition:background var(--t)}
.memo-add-btn:hover{background:var(--primary-dark)}
.memo-list{display:flex;flex-direction:column;gap:8px}
.memo-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 14px;position:relative}
.memo-date{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:5px}
.memo-text{font-size:15px;color:var(--text2);line-height:1.65;padding-right:24px}
.memo-del{position:absolute;top:10px;right:10px;color:var(--text3);font-size:16px;font-weight:700;
  transition:color var(--t)}
.memo-del:hover{color:var(--accent)}

/* Attachments */
.attach-area{margin-top:10px;padding:10px 12px;background:var(--bg);border:1.5px dashed var(--border);
  border-radius:var(--r);display:flex;flex-direction:column;gap:8px}
.attach-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.attach-file-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;
  border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;font-weight:600;
  color:var(--text2);cursor:pointer;transition:border-color var(--t),color var(--t);background:var(--surface)}
.attach-file-btn:hover{border-color:var(--primary);color:var(--primary)}
.attach-file-btn input{display:none}
.attach-link-input{flex:1;min-width:160px;border:1.5px solid var(--border);border-radius:var(--r);
  padding:7px 12px;font-size:14px;outline:none;transition:border-color var(--t);color:var(--text)}
.attach-link-input:focus{border-color:var(--primary)}
.attach-link-btn{padding:7px 14px;background:var(--primary);color:#fff;border-radius:var(--r);
  font-size:14px;font-weight:700;transition:background var(--t)}
.attach-link-btn:hover{background:var(--primary-dark)}

.attach-link-item{display:flex;align-items:center;gap:6px;padding:7px 12px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  font-size:14px;color:var(--primary);max-width:100%;overflow:hidden}
.attach-link-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  cursor:pointer;text-decoration:underline}
.attach-link-item button{color:var(--text3);font-size:15px;font-weight:700;flex-shrink:0}
.attach-link-item button:hover{color:var(--accent)}
.attach-label{font-size:13px;color:var(--text3);font-weight:600}

/* Portfolio textarea */
.pf-textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--r);
  padding:12px 14px;font-size:15px;outline:none;transition:border-color var(--t);
  line-height:1.6;color:var(--text);margin-top:10px}
.pf-textarea:focus{border-color:var(--primary)}
.pf-hint{font-size:14px;color:var(--text3);line-height:1.6;margin-bottom:8px}

/* PD actions */
.pd-actions{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap}
.btn-archive{flex:1;padding:14px 23px;background:var(--text);color:#fff;border-radius:var(--r);
  font-size:16px;font-weight:700;transition:background var(--t)}
.btn-archive:hover{background:#333}
.btn-portfolio{flex:1;padding:14px 23px;background:var(--primary);color:#fff;border-radius:var(--r);
  font-size:16px;font-weight:700;transition:background var(--t)}
.btn-portfolio:hover{background:var(--primary-dark)}

/* Archive fields */
.archive-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 14px;margin-bottom:8px}
.archive-block strong{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text3);display:block;margin-bottom:5px}
.archive-block p{font-size:15px;color:var(--text2);line-height:1.65}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:var(--rmd);padding:28px;max-width:480px;width:100%;
  box-shadow:0 16px 48px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto}
.modal h3{font-size:20px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px}
.modal>p{font-size:15px;color:var(--text2);margin-bottom:20px}
.modal label{display:block;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text3);margin-bottom:5px;margin-top:14px}
.modal textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--r);
  padding:10px 14px;font-size:15px;outline:none;transition:border-color var(--t);line-height:1.6}
.modal textarea:focus{border-color:var(--primary)}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal-actions button{padding:10px 20px;border-radius:var(--r);font-size:15px;font-weight:700;
  border:1.5px solid var(--border);color:var(--text2);transition:all var(--t)}
.modal-actions button:hover{border-color:var(--text);color:var(--text)}
.modal-actions .btn-confirm{background:var(--primary);color:#fff;border-color:var(--primary)}
.modal-actions .btn-confirm:hover{background:var(--primary-dark)}

/* Portfolio View */
.pv-wrap{max-width:720px;margin:0 auto;padding:36px 40px 80px}
.pv-header{text-align:center;margin-bottom:32px}
.pv-header h2{font-size:24px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
.pv-header p{font-size:15px;color:var(--text2)}
.pv-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--rmd);overflow:hidden;
  box-shadow:var(--sh2)}
.pv-card-top{background:linear-gradient(135deg,#2E7D52,#4A9E6E);color:#fff;padding:28px}
.pv-card-cat{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.pv-card-title{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.pv-card-co{font-size:14px;opacity:.75}
.pv-card-dates{font-size:13px;opacity:.6;margin-top:6px}
.pv-block{padding:20px 24px;border-bottom:1px solid var(--border)}
.pv-block:last-child{border-bottom:none}
.pv-block-title{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--primary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.pv-block p,.pv-block-text{font-size:15px;color:var(--text2);line-height:1.75}
.pv-block ul{list-style:none;display:flex;flex-direction:column;gap:5px}
.pv-block ul li{font-size:15px;color:var(--text2);display:flex;gap:7px}
.pv-block ul li::before{content:'→';color:var(--primary);flex-shrink:0}
.pv-memo-item{background:var(--bg);border-radius:var(--r);padding:10px 12px;margin-bottom:7px}
.pv-memo-date{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:4px}
.pv-note{margin-top:20px;padding:16px 18px;background:var(--primary-light);border-radius:var(--r);
  font-size:14px;color:var(--primary);font-weight:600;line-height:1.6;text-align:center}

/* ── Detail — Fit Section ── */
.fit-section{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.fit-col-good,.fit-col-bad{background:var(--bg);border-radius:var(--rmd);padding:14px 16px}
.fit-col-good{border-top:3px solid #22c55e}
.fit-col-bad{border-top:3px solid #f97316}
.fit-col-label{font-size:12px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.fit-col-good .fit-col-label{color:#22c55e}
.fit-col-bad .fit-col-label{color:#f97316}
.fit-item{font-size:14px;color:var(--text2);line-height:1.55;padding:4px 0;display:flex;gap:6px;align-items:flex-start}
.fit-item::before{content:'•';flex-shrink:0;font-weight:700}
.fit-col-good .fit-item::before{color:#22c55e}
.fit-col-bad .fit-item::before{color:#f97316}
.fit-badge-pill{display:inline-block;margin-top:10px;background:var(--primary-light);color:var(--primary);
  font-size:13px;font-weight:700;padding:5px 14px;border-radius:99px;border:1.5px solid var(--primary)}
/* ── Detail — Difficulty Detail ── */
.diff-detail-box{background:var(--bg);border-radius:var(--rmd);padding:16px 18px;margin-top:12px;
  border-left:3px solid var(--primary)}
.diff-desc{font-size:15px;color:var(--text2);line-height:1.7;margin-bottom:10px}
.diff-skills-wrap,.diff-scope-wrap{margin-top:10px}
.diff-skills-label,.diff-scope-label{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  color:var(--primary);margin-bottom:6px}
.diff-skills-list{display:flex;flex-wrap:wrap;gap:6px}
.diff-skill-chip{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);
  padding:4px 12px;font-size:13px;color:var(--text2);font-weight:600}
.diff-scope-text{font-size:14px;color:var(--text2);line-height:1.65}
/* ── Detail — Apply Steps ── */
.apply-steps-box{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.apply-step-row{display:flex;align-items:flex-start;gap:12px}
.apply-step-num{width:27px;height:27px;border-radius:50%;background:var(--primary);color:#fff;
  font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.apply-step-text{font-size:15px;color:var(--text2);line-height:1.6;padding-top:3px}

/* ══════════════════════════════════════
   LANDING PAGE
══════════════════════════════════════ */
/* 섬 전체: 느리고 작은 부유. 6s, 진폭 -10px */
@keyframes islandFloat {
  0%  { transform:translateY(0px); }
  50% { transform:translateY(-18px); }
  100%{ transform:translateY(0px); }
}
/* 구름: 섬 float과 독립적으로 가로로 크게 흔들림 */
@keyframes cloudDrift {
  0%,100%{ transform:translate(0px, 0px); }
  50%    { transform:translate(10px, -4px); }
}
/* 라벨: scale 없이 opacity + 아주 작은 translateY만. 부드럽게 올라오는 느낌 */
@keyframes labelPop {
  from{ opacity:0; transform:translateX(-50%) translateY(5px); }
  to{   opacity:1; transform:translateX(-50%) translateY(0); }
}
/* 캐릭터 말풍선 — 띠용 */
@keyframes bubbleBoing {
  0%   { transform:scale(0);    opacity:0; }
  55%  { transform:scale(1.18); opacity:1; }
  75%  { transform:scale(0.92);            }
  90%  { transform:scale(1.05);            }
  100% { transform:scale(1);    opacity:1; }
}
.char-bubble-wrap{
  position:absolute; pointer-events:none; z-index:30;
  left:50%; top:10%;
  transform:translateX(-50%);
}
.char-bubble{
  display:inline-block;
  background:#fff; border:1.5px solid rgba(0,0,0,.08);
  border-radius:18px; padding:11px 20px;
  font-size:14px; font-weight:700; color:var(--text);
  white-space:nowrap; line-height:1.5;
  box-shadow:0 6px 20px rgba(0,0,0,.13);
  transform-origin:50% 100%;
  animation:bubbleBoing .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
.char-bubble::after{
  content:''; position:absolute;
  top:100%; left:50%; transform:translateX(-50%);
  border:8px solid transparent; border-top-color:#fff;
}
/* 힌트 점: 천천히, 강도 낮게 */
@keyframes hintBlink {
  0%,100%{ opacity:.2; } 50%{ opacity:.65; }
}
/* 전체 랜딩 래퍼 */
.landing-page{
  min-height:calc(100vh - 64px);
  background:linear-gradient(160deg, #C8DFC1 0%, #D8EACF 50%, #C4DDB9 100%);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:24px 24px 32px;
}
/* 아이브로우 라벨 */
.landing-eyebrow{
  font-size:14px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:var(--primary); opacity:.75; margin-bottom:12px;
}
.landing-tagline{ text-align:center; margin-bottom:20px; margin-top:48px; }
/* 메인 카피 */
.landing-tagline h1{
  font-size:35px; font-weight:900; letter-spacing:-.035em;
  color:var(--text); line-height:1.45;
}
.landing-tagline h1 em{ color:var(--primary); font-style:normal; }
/* 서브 카피 */
.landing-tagline p{
  font-size:16px; color:var(--text3); margin-top:12px;
  font-weight:500; line-height:1.75; letter-spacing:.005em;
}
/* 숲 호버 나뭇잎 파티클 — 한 번 튕겨 올랐다 떨어지기 */
@keyframes leafBounce{
  0%  { transform:translateY(0) translateX(0) rotate(0deg) scale(1);
        opacity:.95; animation-timing-function:cubic-bezier(.04,.85,.2,1); }
  22% { transform:translateY(-145px) translateX(var(--lx-peak)) rotate(var(--lr-peak)) scale(1.07);
        opacity:.88; animation-timing-function:cubic-bezier(.4,0,.8,.6); }
  100%{ transform:translateY(35px) translateX(var(--lx-drop)) rotate(var(--lr-drop)) scale(.45);
        opacity:0; }
}
.leaf-particle{position:absolute;pointer-events:none;opacity:0;user-select:none;-webkit-user-drag:none}
.leaf-particle.playing{animation:leafBounce 1.9s var(--ldel,0s) forwards}
/* 섬 씬: padding-bottom으로 aspect-ratio 유지 */
.island-scene{
  position:relative; width:100%; max-width:900px; margin:0 auto;
  overflow:visible;
  animation:islandFloat 4s ease-in-out infinite;
}
/* 3508:2480 = 70.70% */
.island-scene::before{ content:''; display:block; padding-top:70.70%; }
/* 실제 콘텐츠를 담는 inner — 씬 전체를 채움 */
.island-inner{
  position:absolute; top:0; left:0; right:0; bottom:0;
}
/* 모든 요소 이미지: 동일 캔버스 기준으로 절대 스택 */
.el{
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none;
  user-select:none; -webkit-user-drag:none;
  transition: filter .3s ease;
}
/* 구름 전용 래퍼: 독립 좌우 흔들림 */
.clouds-wrap{
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none;
  animation:cloudDrift 7s ease-in-out infinite;
}
/* ── PNG 요소 hover 효과 — img 자체에 직접 적용 ── */
.el-trees-active {
  filter: drop-shadow(0 8px 20px rgba(34,134,74,.5)) brightness(1.04);
}
@keyframes tentWobble{
  0%   { transform: skewX(0deg); }
  25%  { transform: skewX(0.7deg); }
  75%  { transform: skewX(-0.7deg); }
  100% { transform: skewX(0deg); }
}
.el-tent-active {
  filter: drop-shadow(0 8px 20px rgba(196,122,46,.5)) brightness(1.04);
  transform-origin: bottom center;
  animation: tentWobble .45s ease-in-out 2 forwards;
}
/* ── 라벨 말풍선 — island-inner 기준 절대 위치 ── */
.el-label{
  position:absolute; pointer-events:none; z-index:20;
  color:#fff; font-size:15px; font-weight:700; letter-spacing:-.01em;
  padding:8px 20px; border-radius:24px; white-space:nowrap;
  box-shadow:0 5px 20px rgba(0,0,0,.22);
  animation:labelPop .35s cubic-bezier(.16,1,.3,1) forwards;
  transform:translateX(-50%);
}
.el-label::after{
  content:''; position:absolute; top:100%; left:50%;
  transform:translateX(-50%);
  border:6px solid transparent;
}
/* 나무 라벨: 나무 상단 중앙 */
.el-label-trees { left:20%; top:18%; background:#22864a; }
.el-label-trees::after{ border-top-color:#22864a; }
/* 텐트 라벨 */
.el-label-tent  { left:63%; top:22%; background:#C47A2E; }
.el-label-tent::after{ border-top-color:#C47A2E; }
/* 하단 힌트 */
.landing-hint{
  margin-top:20px; display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; font-size:15px; color:var(--text2); font-weight:600; letter-spacing:.02em;
}
.hint-dot{
  width:3px; height:3px; border-radius:50%; background:var(--primary); opacity:.5;
  animation:hintBlink 3s ease-in-out infinite;
}
.hint-dot:last-child{ animation-delay:.5s; }

/* ══════════════════════════════════════
   FOREST EXPLORE
══════════════════════════════════════ */
.forest-explore{ background:#edeae3; min-height:calc(100vh - 64px); }

/* ── 숲 지도 ── */
.fmap-wrap{
  position:relative; width:100%; height:440px; overflow:hidden;
  background-color:#2a4d12;
  background-image:
    radial-gradient(ellipse 100% 100% at 50% 50%, transparent 30%, rgba(0,0,0,.4) 100%),
    radial-gradient(ellipse 240px 180px at 4%  45%, #162d07 0%, transparent 70%),
    radial-gradient(ellipse 200px 220px at 16% 18%, #1a3508 0%, transparent 70%),
    radial-gradient(ellipse 180px 160px at 13% 82%, #162d07 0%, transparent 70%),
    radial-gradient(ellipse 210px 190px at 30% 35%, #1a3508 0%, transparent 70%),
    radial-gradient(ellipse 190px 170px at 36% 88%, #162d07 0%, transparent 70%),
    radial-gradient(ellipse 170px 210px at 50% 15%, #1a3508 0%, transparent 70%),
    radial-gradient(ellipse 200px 180px at 58% 78%, #162d07 0%, transparent 70%),
    radial-gradient(ellipse 220px 170px at 72% 25%, #1a3508 0%, transparent 70%),
    radial-gradient(ellipse 180px 200px at 80% 80%, #162d07 0%, transparent 70%),
    radial-gradient(ellipse 210px 190px at 94% 48%, #1a3508 0%, transparent 70%),
    radial-gradient(ellipse 75% 28% at 50% 58%, rgba(55,105,22,.45) 0%, transparent 100%);
  cursor:default;
}
.fmap-wrap::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,.18) 0%, transparent 35%, transparent 65%, rgba(0,0,0,.35) 100%);
  pointer-events:none;
}
.fmap-svg{ position:absolute; inset:0; width:100%; height:100%; }
.fmap-trail{
  stroke:rgba(255,252,235,.78); stroke-width:2.5; stroke-dasharray:9,16;
  fill:none; filter:drop-shadow(0 0 4px rgba(255,255,200,.45));
}
.fmap-dot{ fill:rgba(255,252,235,.45); }
.fmap-title{
  position:absolute; top:22px; left:36px; z-index:10;
  color:rgba(210,255,165,.9); font-size:13px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase;
  text-shadow:0 1px 8px rgba(0,0,0,.5);
}
.fmap-hint{

function daysLeft(d){ return Math.ceil((new Date(d)-new Date())/86400000); }
function fmtDate(d){
  const n=daysLeft(d);
  if(n<0) return '마감됨';
  if(n===0) return 'D-Day';
  if(n<=14) return `D-${n} 임박`;
  return d;
}
function isUrgent(o){ return daysLeft(o.deadline)<=14; }
function uid(){ return Math.random().toString(36).slice(2); }
function today(){ return new Date().toLocaleDateString('ko-KR'); }

const db = window._db;

function sanitizeForFirestore(projects){ return projects; }

/* 신규 유저에게 보여줄 예시 프로젝트 (id:21 = 안동국제탈춤포스터공모전) */
const SAMPLE_PROJECTS = {};

function useProjects(userId){
  const [projects, setProjectsState] = useState({});
  const saveTimer = useRef(null);

  /* userId 바뀌면 Firestore에서 로드 */
  useEffect(()=>{
    if(!userId){ setProjectsState({}); return; }
    db.collection('users').doc(userId).get().then(snap=>{
      if(snap.exists && snap.data().projects && Object.keys(snap.data().projects).length>0){
        setProjectsState(snap.data().projects);
      } else {
        /* 신규 유저: 예시 프로젝트로 시작 */
        setProjectsState(SAMPLE_PROJECTS);
      }
    }).catch(()=>setProjectsState(SAMPLE_PROJECTS));
  },[userId]);

  const setProjects = useCallback((updater)=>{
    setProjectsState(prev=>{
      const next = typeof updater==='function' ? updater(prev) : updater;
      if(userId){
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(()=>{
          db.collection('users').doc(userId).set({ projects: sanitizeForFirestore(next) }, {merge:true})
            .catch(()=>{});
        }, 800);
      }
      return next;
    });
  },[userId]);

  return [projects, setProjects];
}

function LoginPage({ onLogin }){
  const [id, setId]         = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr]       = useState('');

  function handleLogin(){
    const trimmed = id.trim();
    if(!trimmed){ setErr('아이디를 입력해주세요'); return; }
    if(!/^[a-zA-Z0-9가-힣_.-]{2,20}$/.test(trimmed)){
      setErr('2~20자, 한글·영문·숫자·_.- 만 사용 가능해요'); return;
    }
    setLoading(true); setErr('');
    db.collection('users').doc(trimmed).get()
      .then(doc=>{
        const savedGrade = doc.exists && doc.data().grade ? doc.data().grade : 0;
        onLogin(trimmed, savedGrade);
      })
      .catch(()=>{ setErr('연결 오류가 발생했어요. 다시 시도해주세요'); setLoading(false); });
  }

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <svg width="22" height="18" viewBox="0 0 20 16" fill="none">
            <rect x="0" y="11" width="20" height="5" rx="2.5" fill="currentColor" opacity="0.18"/>

            <path d="M10 4 C7 2 4 3 3.5 5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" fill="none"/>
            <path d="M10 4 C13 2 16 3 16.5 5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" fill="none"/>

function LandingPage({ onExplore, onMyPage }){
  const [activeEl,  setActiveEl]  = useState(null);
  const [bubble,    setBubble]    = useState(null);
  const [treesKey,  setTreesKey]  = useState(0);
  const [tentKey,   setTentKey]   = useState(0);
  const wasPersonRef  = useRef(false);
  const prevActiveRef = useRef(null);
  const lastQuoteRef  = useRef('');

  useEffect(()=>{
    const prev = prevActiveRef.current;
    if(activeEl==='trees' && prev!=='trees') setTreesKey(k=>k+1);
    if(activeEl==='tent'  && prev!=='tent')  setTentKey(k=>k+1);
    prevActiveRef.current = activeEl;
  },[activeEl]);

  /* ── 감지 영역 — trees/person/tent가 겹치지 않도록 분리 ── */
  const ZONES = {
    trees:  { x1:5,  y1:25, x2:50, y2:75 }, // 나무: 왼쪽 (우측 확장)
    person: { x1:39, y1:18, x2:58, y2:74 }, // 캐릭터: 중앙 (머리 위까지 확장)
    tent:   { x1:52, y1:28, x2:78, y2:70 }, // 텐트: 오른쪽
  };

  const hitTest = useCallback((e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width  * 100;
    const y = (e.clientY - rect.top)  / rect.height * 100;
    const z = ZONES;
    if (x>=z.trees.x1  && x<=z.trees.x2  && y>=z.trees.y1  && y<=z.trees.y2)  return 'trees';
    if (x>=z.person.x1 && x<=z.person.x2 && y>=z.person.y1 && y<=z.person.y2) return 'person';
    if (x>=z.tent.x1   && x<=z.tent.x2   && y>=z.tent.y1   && y<=z.tent.y2)   return 'tent';
    return null;
  }, []);

  /* hover로 대사 표시/숨김 */
  const onMove = useCallback((e) => {
    const hit = hitTest(e);
    setActiveEl(hit === 'person' ? null : hit);

    if (hit === 'person' && !wasPersonRef.current) {
      // 캐릭터 영역에 진입 — 랜덤 대사 표시
      const pool = CHAR_QUOTES.filter(q=>q!==lastQuoteRef.current);
      const text = pool[Math.floor(Math.random() * pool.length)];
      lastQuoteRef.current = text;
      setBubble(prev => ({ text, key: (prev?.key ?? 0) + 1 }));
      wasPersonRef.current = true;
    } else if (hit !== 'person' && wasPersonRef.current) {
      // 캐릭터 영역 이탈 — 말풍선 숨김
      setBubble(null);
      wasPersonRef.current = false;
    }
  }, [hitTest]);

  const onLeave = useCallback(() => {
    setActiveEl(null);
    setBubble(null);
    wasPersonRef.current = false;
  }, []);

  const onClick = useCallback((e) => {
    const hit = hitTest(e);
    if (hit === 'trees') onExplore();
    if (hit === 'tent')  onMyPage();
  }, [hitTest, onExplore, onMyPage]);

  return (
    <div className="landing-page">

      {/* 카피 영역 */}
      <div className="landing-tagline">
        <div className="landing-eyebrow">디자인 전공 대학생을 위한</div>
        <h1>기회를 발견하고,<br/><em>작업으로 이어가세요</em></h1>
        <p>공모전 · 인턴 · 스타트업 · 체험단<br/>탐색하고 기록하며, 포트폴리오로 연결하세요</p>
      </div>

      {/* 섬 씬 */}
      <div className="island-scene">
        <div className="island-inner"
          style={{ cursor: (activeEl==='trees'||activeEl==='tent') ? 'pointer'
                         : hitTest !== null ? 'default' : 'default' }}
          onMouseMove={onMove}
          onMouseLeave={onLeave}
          onClick={onClick}>

          {/* 정적 레이어 */}
          <img className="el" src="./island-base.png" alt="" draggable="false"/>
          <div className="clouds-wrap">
            <img className="el" src="./clouds.png" alt="" draggable="false"/>
          </div>

          {/* 인터랙티브 PNG */}
          <img className={`el${activeEl==='trees' ? ' el-trees-active' : ''}`}
               src="./trees.png" alt="" draggable="false"/>
          <img key={`tent-${tentKey}`}
               className={`el${tentKey>0 ? ' el-tent-active' : ''}`}
               src="./tent.png"  alt="" draggable="false"/>
          <img className="el" src="./char.png" alt="" draggable="false"/>

          {/* 숲 호버 나뭇잎 파티클 */}
          {LEAF_PARTICLES.map(lp=>(
            <img key={`${lp.id}-${treesKey}`} src={lp.src} draggable="false" alt=""
              className={`leaf-particle ${treesKey>0?'playing':''}`}
              style={{
                width:lp.w+'px', left:lp.left, bottom:lp.bottom,
                '--lx-peak':lp.lxPeak, '--lr-peak':lp.lrPeak,
                '--lx-drop':lp.lxDrop, '--lr-drop':lp.lrDrop,
                '--ldel':lp.del,
              }}/>
          ))}

          {/* 라벨 */}
          {activeEl==='trees' && <div className="el-label el-label-trees">🌿 탐색하기</div>}
          {activeEl==='tent'  && <div className="el-label el-label-tent" >🏕 내 공간</div>}

          {/* 캐릭터 말풍선 */}
          {bubble && (
            <div className="char-bubble-wrap">
              <div key={bubble.key} className="char-bubble">{bubble.text}</div>
            </div>
          )}

        </div>
      </div>

      {/* 힌트 */}
      <div className="landing-hint">
        <div className="hint-dot"/>
        일러스트 위의 요소를 클릭해 시작하세요
        <div className="hint-dot"/>
      </div>
    </div>
  );
}

function DeadlineBanner({ opps, projects, onOpenDetail }){
  const [closed, setClosed] = React.useState(false);
  if(closed) return null;

  const today = new Date(); today.setHours(0,0,0,0);
  const urgent = opps
    .filter(o => projects[o.id]?.status==='saved' && o.deadline)
    .map(o => {
      const diff = Math.ceil((new Date(o.deadline) - today) / 86400000);
      return { ...o, diff };
    })
    .filter(o => o.diff >= 0 && o.diff <= 7)
    .sort((a,b) => a.diff - b.diff);

  if(urgent.length === 0) return null;

  return (
    <div className="deadline-banner">
      <span className="deadline-banner-icon">⏰</span>
      <span className="deadline-banner-text">저장한 공고 마감 임박!</span>
      <div className="deadline-banner-items">
        {urgent.map(o => (
          <button key={o.id} className="deadline-banner-item" onClick={()=>onOpenDetail(o)}>
            {o.title.length>16 ? o.title.slice(0,16)+'…' : o.title}
            <span className="dday">{o.diff===0 ? 'D-day' : `D-${o.diff}`}</span>
          </button>
        ))}
      </div>
      <button className="deadline-banner-close" onClick={()=>setClosed(true)}>×</button>
    </div>
  );
}

function ExplorePage({ opps, projects, onSave, onOpenDetail, userGrade }){
  const [search, setSearch] = useState('');
  const [cat, setCat]       = useState('');
  const [field, setField]   = useState('');
  const [chips, setChips]   = useState(new Set());
  const [gradeF, setGradeF] = useState(userGrade||0);
  const cardSectionRef = React.useRef(null);

  function handleCatSelect(key){
    const next = cat===key ? '' : key;
    setCat(next);
    if(next) setTimeout(()=>cardSectionRef.current?.scrollIntoView({behavior:'smooth',block:'start'}),50);
  }

  function scrollToCards(){ setTimeout(()=>cardSectionRef.current?.scrollIntoView({behavior:'smooth',block:'start'}),50); }

  function toggleChip(c){
    setChips(prev=>{ const n=new Set(prev); n.has(c)?n.delete(c):n.add(c); return n; });
    scrollToCards();
  }
  const activeOpps = opps.filter(o=>daysLeft(o.deadline)>=0);
  const filtered = activeOpps.filter(o=>{
    if(cat && o.category!==cat) return false;
    if(field && !o.field.includes(field)) return false;
    if(chips.has('urgent') && !isUrgent(o)) return false;
    if(chips.has('nopf') && o.portfolio==='required') return false;
    if(chips.has('easy') && o.difficulty!==1) return false;
    if(chips.has('new') && !o.crawledAt) return false;
    if(gradeF && o.grade && !o.grade.includes(gradeF)) return false;
    if(search){
      const keywords=search.toLowerCase().trim().split(/\s+/).filter(Boolean);
      const hay=[o.title,o.company,o.field,o.shortDesc||'',(o.tags||[]).join(' '),(o.skills||[]).join(' '),CAT_LABEL[o.category]||''].join(' ').toLowerCase();
      if(!keywords.some(kw=>hay.includes(kw))) return false;
    }
    return true;
  });

  /* 숲 구역 — 경로를 따라 왼쪽(입구)→오른쪽(깊은 숲) 배치
     x/y: fmap-wrap 기준 % */
  const ZONES = [
    { key:'parttime', x:11, y:68, label:'알바',    sub:'숲의 입구' },
    { key:'intern',   x:27, y:54, label:'인턴',    sub:'양지바른 언덕' },
    { key:'contest',  x:50, y:58, label:'공모전',  sub:'숲의 한가운데' },
    { key:'exp',      x:71, y:50, label:'체험단',  sub:'오솔길' },
    { key:'startup',  x:88, y:58, label:'스타트업',sub:'숲의 깊은 곳' },
  ];

  /* SVG 경로 (1000×440 viewBox, preserveAspectRatio="none") */
  const TRAIL = "M 20,320 C 80,308 95,290 110,285 C 150,274 180,242 270,238 C 345,234 400,248 500,252 C 600,256 650,228 710,222 C 768,217 840,244 880,250 C 920,256 960,238 990,232";
  /* 경로 위 소형 앰비언트 점 */
  const AMBIENT = [{cx:200,cy:262},{cx:355,cy:242},{cx:500,cy:252},{cx:650,cy:229},{cx:800,cy:246}];

  const newOpps = opps.filter(o => o.crawledAt).sort((a,b)=>new Date(b.crawledAt)-new Date(a.crawledAt));
  const [bannerDismissed, setBannerDismissed] = React.useState(false);
  const showBanner = newOpps.length > 0 && !bannerDismissed && !chips.has('new');

  return (
    <div className="forest-explore">

      {/* ── 신규 등록 알림 배너 ── */}
      {showBanner && (
        <div className="fnew-banner">
          <div className="fnew-banner-left">
            <div className="fnew-banner-dot"/>
            <div>
              <div className="fnew-banner-text">✨ 새로 수집된 공고가 있어요!</div>
              <div className="fnew-banner-count">{newOpps.length}개 신규 등록</div>
            </div>
          </div>
          <button className="fnew-banner-btn" onClick={()=>{ toggleChip('new'); setBannerDismissed(true); }}>신규 공고 보기</button>
          <span className="fnew-banner-close" onClick={()=>setBannerDismissed(true)}>×</span>
        </div>
      )}

      {/* ── 숲 지도 ── */}
      <div className="fmap-wrap">
        <div className="fmap-title">🌲 기회의 숲</div>

        {/* 경로 SVG */}
        <svg className="fmap-svg" viewBox="0 0 1000 440" preserveAspectRatio="none">
          {AMBIENT.map((p,i)=><circle key={i} cx={p.cx} cy={p.cy} r="2.5" className="fmap-dot"/>)}
          <path d={TRAIL} className="fmap-trail"/>
        </svg>

        {/* 구역 마커 */}
        {ZONES.map(z=>(
          <div key={z.key}
               className={`fzone-wrap ${cat===z.key?'active':''}`}
               style={{left:z.x+'%', top:z.y+'%'}}
               onClick={()=>handleCatSelect(z.key)}>
            <div className="fzone-label">
              <div className="fzone-icon">{CAT_ICON[z.key]}</div>
              <div className="fzone-name">{z.label}</div>
              <div className="fzone-sub">{z.sub}</div>
              <div className="fzone-cnt">{activeOpps.filter(o=>o.category===z.key).length}개</div>
            </div>
            <div className="fzone-pin"/>
          </div>
        ))}

        <div className="fmap-hint">구역을 클릭해 탐색하세요</div>
        <div className="fmap-fade"/>
      </div>

      {/* ── 검색 + 필터 + 카드 ── */}
      <div className="fcard-section" ref={cardSectionRef}>
        <div className="fcard-filters">
          <div style={{flex:'1',minWidth:'260px',display:'flex',flexDirection:'column',gap:'5px'}}>
            <div style={{maxWidth:'480px',margin:'0 auto',width:'100%'}}>
              <div className="hero-search" style={{margin:0,maxWidth:'none'}}>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="공고명, 회사, 분야로 검색"/>
                <button>검색</button>
              </div>
              <div style={{fontSize:'11px',color:'var(--text3)',paddingLeft:'20px',marginTop:'4px'}}>🔗 찾는 공고가 없으면 링커리어·위비티 검색으로 바로 연결해드려요</div>
            </div>
          </div>
          <select className="filter-select" value={field} onChange={e=>{ setField(e.target.value); if(e.target.value) scrollToCards(); }}>
            <option value="">모든 분야</option>
            {['브랜딩','UI/UX','그래픽','모션','제품','타이포'].map(f=><option key={f} value={f}>{f}</option>)}
          </select>
          <div className={`filter-chip ${chips.has('urgent')?'on':''}`} onClick={()=>toggleChip('urgent')}>⏰ 마감 임박</div>
          <div className={`filter-chip ${chips.has('nopf')?'on':''}`} onClick={()=>toggleChip('nopf')}>🗂️ 포폴 불필요</div>
          <div className={`filter-chip ${chips.has('easy')?'on':''}`} onClick={()=>toggleChip('easy')}>🌱 입문자 가능</div>
          <div className={`filter-chip ${chips.has('new')?'on':''}`} style={chips.has('new')?{}:{position:'relative'}} onClick={()=>{ toggleChip('new'); setBannerDismissed(true); }}>
            ✨ 신규 등록
            {newOpps.length > 0 && !chips.has('new') && <span style={{position:'absolute',top:'-5px',right:'-5px',background:'var(--accent)',color:'#fff',fontSize:'10px',fontWeight:800,padding:'2px 5px',borderRadius:'99px',lineHeight:1}}>{newOpps.length}</span>}
          </div>
          <span className="filter-count">{filtered.length}개</span>
        </div>
        <div className="grade-filter-row">
          <span className="grade-filter-label">🎓 학년별</span>
          {[{v:0,l:'전체'},{v:1,l:'1학년'},{v:2,l:'2학년'},{v:3,l:'3학년'},{v:4,l:'4학년'}].map(g=>(
            <div key={g.v} className={`grade-chip ${gradeF===g.v?'on':''}`} onClick={()=>{ setGradeF(g.v); if(g.v) scrollToCards(); }}>{g.l}</div>
          ))}
        </div>

        <div className="fcard-header">
          <div className="fcard-title">
            {cat ? `${CAT_ICON[cat]} ${CAT_LABEL[cat]} 공고` : '🌿 전체 공고'}
          </div>
          {cat && <button className="fcard-back" onClick={()=>setCat('')}>전체 보기</button>}
        </div>

        {filtered.length===0
          ? <div className="no-results">
              {search
                ? <>
                    <div className="no-results-title">"{search}" 관련 공고가 없어요</div>
                    <div className="no-results-sub">외부 공모전 플랫폼에서 더 찾아볼까요?</div>
                    <div className="external-search-row">
                      <a className="external-search-btn" href={`https://linkareer.com/list/contest?keyword=${encodeURIComponent(search)}`} target="_blank" rel="noopener noreferrer">
                        <span className="ext-icon">🔗</span> 링커리어에서 검색
                      </a>
                      <a className="external-search-btn" href={`https://www.wevity.com/index_university.php?c=find&s=_university&gub=1&sidx=0&search=${encodeURIComponent(search)}`} target="_blank" rel="noopener noreferrer">
                        <span className="ext-icon">🔍</span> 위비티에서 검색
                      </a>
                    </div>
                  </>
                : <span>조건에 맞는 공고가 없어요. 필터를 바꿔보세요.</span>
              }
            </div>
          : <div className="cards-grid">{filtered.map(o=><OppCard key={o.id} opp={o} project={projects[o.id]} onSave={onSave} onClick={onOpenDetail}/>)}</div>
        }
      </div>
    </div>
  );
}

/* 매칭 점수 계산 */
function calcMatch(opp, profile){
  const fieldArr = Array.isArray(profile.field)?profile.field:(profile.field?[profile.field]:[]);
  const hasAny = profile.grade||fieldArr.length>0||profile.category||profile.hasPortfolio||profile.difficulty;
  if(!hasAny) return null;
  let score=0, max=0, reasons=[];

  if(profile.grade){
    max+=25;
    if(opp.grade&&opp.grade.includes(Number(profile.grade))){
      score+=25; reasons.push(`${profile.grade}학년 조건 충족`);
    }
  }
  if(fieldArr.length>0){
    max+=30;
    if(opp.field&&fieldArr.includes(opp.field)){
      score+=30; reasons.push(`${opp.field} 분야 일치`);
    }
  }
  if(profile.category){
    max+=20;
    if(opp.category===profile.category){
      score+=20; reasons.push(`${CAT_LABEL[profile.category]} 유형 일치`);
    }
  }
  if(profile.hasPortfolio){
    max+=15;
    if(profile.hasPortfolio==='none'&&opp.portfolio==='none'){
      score+=15; reasons.push('포트폴리오 불필요');
    } else if(profile.hasPortfolio==='has'){
      score+=15; reasons.push('포트폴리오 보유');
    }
  }
  if(profile.difficulty){
    max+=10;
    if(opp.difficulty===Number(profile.difficulty)){
      score+=10; reasons.push('난이도 적합');
    }
  }
  const pct = max===0 ? 0 : Math.round((score/max)*100);
  return { pct, reasons };
}

function MatchBar({ pct, reasons }){
  const cls = pct>=70?'high':pct>=40?'mid':'low';
  return (
    <div className="match-bar-wrap">
      <div className="match-bar-header">
        <span className="match-label">나와의 적합도</span>
        <span className={`match-pct ${cls}`}>{pct}%</span>
      </div>
      <div className="match-bg"><div className={`match-fill ${cls}`} style={{width:`${pct}%`}}/></div>
      {reasons.length>0 && (
        <div className="match-reasons">
          {reasons.map((r,i)=><span key={i} className="match-tag">✓ {r}</span>)}
        </div>
      )}
    </div>
  );
}
