/* ─ 상세 점수 계산 ─ */
const TOOLS_LIST = ['Figma','Illustrator','Photoshop','After Effects','Premiere','InDesign','Blender','기타'];

function getOppTools(opp){
  const all = [...(opp.requiredSkills||[]),...(opp.skills||[])].join(' ');
  return TOOLS_LIST.filter(t=>all.toLowerCase().includes(t.toLowerCase()));
}
function timeLevel(estimatedTime){
  if(!estimatedTime) return 'any';
  if(/\d+개월|반년|수개월/.test(estimatedTime)) return 'high';
  const m=estimatedTime.match(/(\d+)/g);
  if(m && Math.max(...m.map(Number))>=4) return 'mid';
  return 'low';
}

function calcDetail(opp, profile){
  const rows=[]; let score=0, max=0;

  // 학년
  if(profile.grade){
    max+=20; const hit=opp.grade&&opp.grade.includes(Number(profile.grade));
    score+=hit?20:0;
    rows.push({label:'학년 조건', icon:hit?'✅':'📌', earned:hit?20:0, maxPts:20,
      reason: hit ? `${profile.grade}학년 지원 가능` : `지원 연령 폭이 넓어요 — 직접 확인 후 도전해보세요`});
  }
  // 관심 분야
  const _fieldArr = Array.isArray(profile.field)?profile.field:(profile.field?[profile.field]:[]);
  if(_fieldArr.length>0){
    max+=20; const hit=opp.field&&_fieldArr.includes(opp.field);
    score+=hit?20:0;
    rows.push({label:'관심 분야', icon:hit?'✅':'📌', earned:hit?20:0, maxPts:20,
      reason: hit ? `${opp.field} 분야와 일치해요` : `${opp.field} 분야 공고예요 — 새 분야를 경험해볼 기회가 될 수 있어요`});
  }
  // 관심 유형
  if(profile.category){
    max+=15; const hit=opp.category===profile.category;
    score+=hit?15:0;
    rows.push({label:'관심 유형', icon:hit?'✅':'📌', earned:hit?15:0, maxPts:15,
      reason: hit ? `${CAT_LABEL[profile.category]} 유형 일치` : `${CAT_LABEL[opp.category]} 유형이에요 — 다양한 경험이 될 수 있어요`});
  }
  // 포트폴리오
  if(profile.hasPortfolio){
    max+=15; const hit=profile.hasPortfolio==='has'||opp.portfolio==='none';
    score+=hit?15:5;
    rows.push({label:'포트폴리오', icon:hit?'✅':'📌', earned:hit?15:5, maxPts:15,
      reason: profile.hasPortfolio==='has' ? '포트폴리오 보유 — 폭넓게 도전 가능해요'
        : hit ? '포트폴리오 없이도 지원 가능한 공고예요'
        : '포트폴리오가 있으면 더 유리한 공고예요 — 준비 중이라면 도전해보는 것도 좋아요'});
  }
  // 목표
  if(profile.goal){
    max+=15;
    const goalMap={portfolio:['contest','intern','startup'],award:['contest'],work:['intern','startup'],exp:['exp','parttime']};
    const hit=(goalMap[profile.goal]||[]).includes(opp.category);
    score+=hit?15:5;
    const goalLabel={portfolio:'포트폴리오 강화',award:'수상 이력',work:'실무 경험',exp:'다양한 경험'};
    rows.push({label:'목표 부합', icon:hit?'✅':'📌', earned:hit?15:5, maxPts:15,
      reason: hit ? `${goalLabel[profile.goal]} 목표와 잘 맞아요`
        : `주 목표와는 조금 달라요 — 부가적인 경험으로 도전해볼 수 있어요`});
  }
  // 툴
  const userTools=profile.tools||[];
  if(userTools.length>0){
    max+=15;
    const required=getOppTools(opp);
    if(required.length===0){ score+=15; rows.push({label:'활용 툴', icon:'✅', earned:15, maxPts:15, reason:'특정 툴 제한 없이 자유롭게 작업 가능해요'}); }
    else {
      const known=required.filter(t=>userTools.includes(t));
      const pts=known.length===required.length?15:known.length>0?10:6;
      score+=pts;
      rows.push({label:'활용 툴', icon:pts===15?'✅':'📌', earned:pts, maxPts:15,
        reason: pts===15 ? `보유 툴(${known.join(', ')})로 작업 가능해요`
          : known.length>0 ? `${known.join(', ')} 보유 — 나머지 툴은 공고를 준비하며 익힐 수 있어요`
          : `${required[0]} 등을 활용하는 공고예요 — 새 툴을 배울 수 있는 좋은 기회예요`});
    }
  }
  // 가용 시간
  if(profile.timePerWeek){
    max+=15;
    const oppLevel=timeLevel(opp.estimatedTime);
    const timeOk={low:['low','any'],mid:['low','mid','any'],high:['low','mid','high','any']}[profile.timePerWeek]||[];
    const hit=timeOk.includes(oppLevel);
    score+=hit?15:8;
    const timeLabel={low:'주 5시간 미만',mid:'주 5~15시간',high:'주 15시간 이상'};
    rows.push({label:'준비 시간', icon:hit?'✅':'📌', earned:hit?15:8, maxPts:15,
      reason: hit ? `${timeLabel[profile.timePerWeek]}으로 충분히 준비 가능한 공고예요`
        : `여유 있게 준비하면 좋을 공고예요 (예상 소요: ${opp.estimatedTime||'공고 참고'})`});
  }

  const pct=max===0?0:Math.round((score/max)*100);
  return {pct,rows,score,max};
}

function ResultCard({ opp, detail, rank }){
  const cls=detail.pct>=70?'high':detail.pct>=40?'mid':'low';

    : detail.pct>=40
    ? `충분히 도전해볼 만한 공고예요. 일부 항목은 공고를 준비하면서 함께 성장할 수 있어요.`
    : `현재 조건과 다소 차이가 있지만, 관심 있다면 언제든 도전할 수 있어요. 부담 없이 살펴보세요.`;
  return (

        </div>
      </div>
      <div className="result-bar-wrap">
        <div className="result-bar-label"><span>적합도</span><span>{detail.score}/{detail.max}점</span></div>

      <table className="result-table">
        <thead><tr>
          <th style={{width:'28%'}}>항목</th>
          <th style={{width:'8%',textAlign:'center'}}></th>
          <th style={{width:'18%'}}>점수</th>
          <th>참고 내용</th>
        </tr></thead>
        <tbody>
          {detail.rows.map((r,i)=>(
            <tr key={i}>
              <td className="result-criterion-label">{r.label}</td>
              <td className="result-criterion-icon">{r.icon}</td>
              <td className={`result-criterion-score ${r.earned===r.maxPts?'hit':'miss'}`}>+{r.earned}/{r.maxPts}점</td>
              <td className="result-criterion-reason">{r.reason}</td>
            </tr>
          ))}
        </tbody>
      </table>
      <div className={`result-summary ${cls}`}>{summaryText}</div>
    </div>
  );
}

function AnalysisTab({ opps, projects, profile, onProfileChange }){
  const saved=opps.filter(o=>projects[o.id]?.status==='saved');
  const [selected,setSelected]=useState(new Set());
  const [results,setResults]=useState(null);
  const p=profile||{};
  const pFields=Array.isArray(p.field)?p.field:(p.field?[p.field]:[]);
  const hasProfile=p.grade||pFields.length>0||p.category||p.goal||p.timePerWeek||(p.tools&&p.tools.length>0);
  const filledCount=[p.grade,pFields.length>0?'y':'',p.category,p.hasPortfolio,p.goal,p.timePerWeek,(p.tools&&p.tools.length>0)?'y':''].filter(Boolean).length;

  function toggleField(f){
    onProfileChange('field',pFields.includes(f)?pFields.filter(x=>x!==f):[...pFields,f]);
  }
  function toggleTool(t){
    const cur=p.tools||[];
    onProfileChange('tools',cur.includes(t)?cur.filter(x=>x!==t):[...cur,t]);
  }
  function toggleSelect(id){setSelected(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});}
  function runAnalysis(){
    const res=saved.filter(o=>selected.has(o.id))
      .map(o=>({opp:o,detail:calcDetail(o,p)}))
      .sort((a,b)=>b.detail.pct-a.detail.pct);
    setResults(res);
  }

  if(results) return (
    <div>
      <button className="result-back" onClick={()=>setResults(null)}>← 다시 선택</button>
      {results.length>=2 && (
        <div className="result-compare">
          <div className="result-compare-title">📊 적합도 비교 순위</div>
          {(()=>{
            // 동점 순위 계산
            const rankOf=results.map(({detail},i)=>{
              const higher=results.filter((_,j)=>j<i&&results[j].detail.pct>detail.pct).length;
              return higher===0?1:results.slice(0,i).filter(r=>r.detail.pct>detail.pct).length+1;
            });
            // 실제 순위: 나보다 높은 점수가 몇 명인지 + 1
            const ranks=results.map(({detail})=>results.filter(r=>r.detail.pct>detail.pct).length+1);
            const topRank=Math.min(...ranks);
            const topCount=ranks.filter(r=>r===topRank).length;
            return results.map(({opp,detail},i)=>{
              const r=ranks[i];
              const isTop=r===1;
              const isTied=topCount>1&&isTop;
              const label=isTied?`🤝 공동 ${r}위`:`${r}위`;
              return (
                <div key={opp.id} className="rank-row" style={{marginBottom:i<results.length-1?'8px':0}}>
                  <div className={`rank-num ${isTop&&!isTied?'top':''} ${isTied?'tied':''}`}>{label}</div>
                  <div className="rank-info"><div className="rank-name">{opp.title}</div><div className="rank-company">{opp.company}</div></div>
                  <div className="rank-bar-wrap">
                    <div className="rank-bar-bg"><div className="rank-bar-fill" style={{width:`${detail.pct}%`}}/></div>
                    <div className="rank-pct">{detail.pct}%</div>
                  </div>
                </div>
              );
            });
          })()}
        </div>
      )}
      {(()=>{
        const ranks=results.map(({detail})=>results.filter(r=>r.detail.pct>detail.pct).length+1);
        return results.map(({opp,detail},i)=><ResultCard key={opp.id} opp={opp} detail={detail} rank={results.length>=2?ranks[i]-1:null}/>);
      })()}
    </div>
  );

  return (
    <div className="analysis-wrap">
      <div className="analysis-section">
        <div className="analysis-section-title">① 나에 대해 알려주세요 {filledCount>0&&<span className="match-tag">{filledCount}/7 입력됨</span>}</div>
        <div className="profile-grid">
          <div className="profile-field">
            <label>학년</label>
            <select value={p.grade||''} onChange={e=>onProfileChange('grade',e.target.value)}>
              <option value="">선택</option>{[1,2,3,4].map(g=><option key={g} value={g}>{g}학년</option>)}
            </select>
          </div>
          <div className="profile-field full">
            <label>주요 관심 분야 (복수 선택 가능)</label>
            <div className="tool-chips">
              {['그래픽','UI/UX','브랜딩','타이포','제품','모션','기타'].map(f=>(
                <div key={f} className={`tool-chip ${pFields.includes(f)?'on':''}`} onClick={()=>toggleField(f)}>{f}</div>
              ))}
            </div>
          </div>
          <div className="profile-field">
            <label>관심 활동 유형</label>
            <select value={p.category||''} onChange={e=>onProfileChange('category',e.target.value)}>
              <option value="">선택</option>
              {[['contest','공모전'],['intern','인턴'],['startup','스타트업'],['exp','체험단'],['parttime','알바']].map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select>
          </div>
          <div className="profile-field">
            <label>포트폴리오 여부</label>
            <select value={p.hasPortfolio||''} onChange={e=>onProfileChange('hasPortfolio',e.target.value)}>

function MemoPad({ memos, onAdd, onDelete, onEdit }){
  const [text, setText] = useState('');
  const [editIdx, setEditIdx] = useState(null);
  const [editText, setEditText] = useState('');
  function fmt(iso){
    const d=new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}  ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  function submit(){
    if(!text.trim()) return;
    onAdd(text.trim());
    setText('');
  }
  function startEdit(i){
    setEditIdx(i);
    setEditText(memos[i].text);
  }
  function saveEdit(){
    if(!editText.trim()) return;
    onEdit(editIdx, editText.trim());
    setEditIdx(null);
  }
  function cancelEdit(){ setEditIdx(null); }
  return (
    <div className="memo-pad">
      <div className="memo-pad-title">📝 메모</div>
      {memos.length>0
        ? <div className="memo-list">
            {memos.map((m,i)=>(
              <div key={i} className="memo-item">
                <div className="memo-item-date">
                  {fmt(m.createdAt)}{m.editedAt&&<span style={{color:'var(--text3)',marginLeft:6,fontSize:11}}>(수정됨)</span>}
                  <span className="memo-item-actions">
                    <button className="memo-item-edit" onClick={()=>startEdit(i)}>수정</button>
                    <button className="memo-item-del" onClick={()=>onDelete(i)}>삭제</button>
                  </span>
                </div>
                {editIdx===i
                  ? <div className="memo-item-editing">
                      <textarea rows={3} value={editText} onChange={e=>setEditText(e.target.value)}
                        onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveEdit();}
                          else if(e.key==='Escape') cancelEdit();}}/>
                      <div className="memo-item-edit-actions">
                        <button className="memo-edit-cancel" onClick={cancelEdit}>취소</button>
                        <button className="memo-edit-save" onClick={saveEdit}>저장</button>
                      </div>
                    </div>
                  : <div className="memo-item-text">{m.text}</div>
                }
              </div>
            ))}
          </div>
        : <div className="memo-empty">아직 작성한 메모가 없어요.</div>
      }
      <div className="memo-input-wrap">
        <textarea rows={3} value={text} onChange={e=>setText(e.target.value)}
          placeholder="아이디어, 하고 싶은 말, 관심 분야 등 자유롭게 적어두세요..."
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}}}/>
        <button className="memo-submit" onClick={submit} disabled={!text.trim()}>등록</button>
      </div>
    </div>
  );
}

function ProjectDetailPage({ opp, project, onBack, onUpdate, onArchive, onPortfolio }){
  const [newCheck, setNewCheck]   = useState('');
  const [newMemo,  setNewMemo]    = useState('');
  const [newLink,  setNewLink]    = useState('');
  const [showModal, setShowModal] = useState(false);
  const [archData, setArchData]   = useState({ role:'', result:'', learnings:'' });

  if(!opp||!project) return null;
  const ar = project.status==='archived';
  const done = (project.steps||[]).filter(Boolean).length;
  const pct  = Math.round((done/DEFAULT_STEPS.length)*100);

  function toggleStep(i){
    if(ar) return;
    onUpdate(p=>({...p, steps:p.steps.map((s,j)=>j===i?!s:s)}));
  }
  function addCheck(){
    if(!newCheck.trim()) return;
    onUpdate(p=>({...p, checklist:[...(p.checklist||[]),{id:uid(),text:newCheck.trim(),done:false}]}));
    setNewCheck('');
  }
  function toggleCheck(id){
    if(ar) return;
    onUpdate(p=>({...p, checklist:p.checklist.map(c=>c.id===id?{...c,done:!c.done}:c)}));
  }
  function delCheck(id){ onUpdate(p=>({...p, checklist:p.checklist.filter(c=>c.id!==id)})); }
  function addMemo(){
    if(!newMemo.trim()) return;
    onUpdate(p=>({...p, memos:[...(p.memos||[]),{id:uid(),text:newMemo.trim(),date:today()}]}));
    setNewMemo('');
  }
  function delMemo(id){ onUpdate(p=>({...p, memos:p.memos.filter(m=>m.id!==id)})); }
  function updatePF(v){ onUpdate(p=>({...p, portfolioPoints:v})); }
  function addLinkAttach(){
    const url = newLink.trim(); if(!url) return;
    const label = url.replace(/^https?:\/\//,'').replace(/\/.*$/,'');
    onUpdate(p=>({...p, attachments:[...(p.attachments||[]),
      {id:uid(), type:'link', name:label, data:url, date:today()}]}));
    setNewLink('');
  }
  function delAttach(id){ onUpdate(p=>({...p, attachments:(p.attachments||[]).filter(a=>a.id!==id)})); }

  return (
    <div className="pd-wrap">
      <button className="detail-back" onClick={onBack}>← 내 공간</button>

      <div className="pd-opp-header">
        <span className={`tag tag-${opp.category}`}>{CAT_LABEL[opp.category]}</span>
        <span className="pd-co">{opp.company}</span>
        {ar ? <span className="badge-archived">완료</span> : <span className="badge-progress">진행중</span>}
      </div>
      <h2 className="pd-title">{opp.title}</h2>
      <div className="pd-meta">
        <span>📅 시작: {project.startDate}</span>
        <span>📅 마감: {opp.deadline}</span>
        {ar && <span>✅ 완료: {project.endDate}</span>}
      </div>

      {/* Steps */}
      <div className="pd-section">
        <div className="pd-section-title">단계 진행</div>
        <div className="step-prog-wrap">
          <div className="step-prog-bar"><div className="step-prog-fill" style={{width:`${pct}%`}}/></div>
          <div className="step-prog-text">{done}/{DEFAULT_STEPS.length} 단계 완료 ({pct}%)</div>
        </div>
        <div className="steps-list">
          {DEFAULT_STEPS.map((step,i)=>(
            <div key={i} className={`step-item ${(project.steps||[])[i]?'done':''} ${ar?'archived':''}`} onClick={()=>toggleStep(i)}>
              <span className="step-num">{i+1}</span>
              <span className="step-label">{step}</span>
              {(project.steps||[])[i] && <span className="step-check">✓</span>}
            </div>
          ))}
        </div>
      </div>

      {/* Checklist */}
      <div className="pd-section">
        <div className="pd-section-title">할 일 체크리스트</div>
        {!ar && (
          <div className="add-row">
            <input value={newCheck} onChange={e=>setNewCheck(e.target.value)}
              placeholder="할 일을 추가하세요..." onKeyDown={e=>e.key==='Enter'&&addCheck()}/>
            <button onClick={addCheck}>추가</button>
          </div>
        )}
        <div className="cl-list">
          {(project.checklist||[]).length===0
            ? <div className="empty-hint">할 일을 추가해보세요</div>
            : (project.checklist||[]).map(c=>(
                <div key={c.id} className={`cl-row ${c.done?'done':''}`}>
                  <input type="checkbox" checked={c.done} onChange={()=>toggleCheck(c.id)} readOnly={ar}/>
                  <span className="cl-text">{c.text}</span>
                  {!ar && <button className="del-btn" onClick={()=>delCheck(c.id)}>×</button>}
                </div>
              ))
          }
        </div>
      </div>

      {/* Memo */}
      <div className="pd-section">
        <div className="pd-section-title">메모 & 과정 기록</div>
        {!ar && (
          <div className="memo-add">
            <textarea value={newMemo} onChange={e=>setNewMemo(e.target.value)}

            <button className="memo-add-btn" onClick={addMemo}>저장</button>
          </div>
        )}
        {!ar && (
          <div className="attach-area">
            <div className="attach-label">🔗 링크 첨부</div>

              <input className="attach-link-input" value={newLink} onChange={e=>setNewLink(e.target.value)}

              <button className="attach-link-btn" onClick={addLinkAttach}>추가</button>
            </div>
          </div>
        )}
        <div className="memo-list">
          {(project.memos||[]).length===0
            ? <div className="empty-hint">과정을 메모로 기록해두면 포트폴리오 작성에 도움이 돼요</div>
            : (project.memos||[]).map(m=>(
                <div key={m.id} className="memo-card">
                  <div className="memo-date">{m.date}</div>
                  <div className="memo-text">{m.text}</div>
                  {!ar && <button className="memo-del del-btn" onClick={()=>delMemo(m.id)}>×</button>}
                </div>
              ))
          }
        </div>
        {(project.attachments||[]).length>0 && (
          <div style={{marginTop:'12px'}}>
            <div className="attach-label" style={{marginBottom:'8px'}}>첨부된 링크</div>
            {(project.attachments||[]).map(a=>(
              <div key={a.id} className="attach-link-item" style={{marginBottom:'6px'}}>
                🔗 <span onClick={()=>window.open(a.data,'_blank')}>{a.data}</span>
                {!ar && <button onClick={()=>delAttach(a.id)}>×</button>}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Portfolio Points */}
      <div className="pd-section">
        <div className="pd-section-title">포트폴리오 연결 포인트</div>
        <div className="pf-hint">이 활동을 통해 얻은 경험과 역량을 직접 정리해보세요</div>
        <div style={{marginBottom:'10px'}}>{opp.skills.map((s,i)=><span key={i} className="skill-chip">{s}</span>)}</div>
        {ar
          ? <div className="memo-card"><div className="memo-text">{project.portfolioPoints||'기록된 내용이 없어요'}</div></div>
          : <textarea className="pf-textarea" value={project.portfolioPoints||''} onChange={e=>updatePF(e.target.value)}
              placeholder="예: 브랜딩 BI 제작 경험, 타이포그래피 감각 향상, 클라이언트 커뮤니케이션..." rows={4}/>
        }
      </div>

      {/* Archive fields (archived only) */}
      {ar && (
        <div className="pd-section">
          <div className="pd-section-title">완료 기록</div>
          <div className="archive-block"><strong>내가 한 역할</strong><p>{project.role||'—'}</p></div>
          <div className="archive-block"><strong>결과</strong><p>{project.result||'—'}</p></div>
          <div className="archive-block"><strong>배운 점</strong><p>{project.learnings||'—'}</p></div>
        </div>
      )}

      <div className="pd-actions">
        {!ar && <button className="btn-archive" onClick={()=>setShowModal(true)}>✅ 완료로 이동</button>}
        {ar  && <button className="btn-portfolio" onClick={onPortfolio}>📎 포트폴리오로 정리하기</button>}
      </div>

      {/* Archive Modal */}
      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>완료 기록 남기기</h3>
            <p>완료 전에 이 활동의 기록을 남겨두세요. 나중에 포트폴리오 정리에 쓰입니다.</p>
            <label>내가 한 역할</label>
            <textarea value={archData.role} onChange={e=>setArchData({...archData,role:e.target.value})}
              placeholder="예: UI 디자인, 브랜드 아이덴티티 제작, 팀 리드" rows={2}/>
            <label>결과</label>
            <textarea value={archData.result} onChange={e=>setArchData({...archData,result:e.target.value})}
              placeholder="예: 우수상 수상, 포트폴리오 케이스 추가, 인턴십 경험 완료" rows={2}/>
            <label>배운 점</label>
            <textarea value={archData.learnings} onChange={e=>setArchData({...archData,learnings:e.target.value})}
              placeholder="예: 클라이언트와 소통하는 방법, 빠른 프로토타이핑, 타이포 디테일 등" rows={2}/>
            <div className="modal-actions">
              <button onClick={()=>setShowModal(false)}>취소</button>
              <button className="btn-confirm" onClick={()=>{ onArchive(archData); setShowModal(false); }}>완료로 이동</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   PORTFOLIO VIEW
═══════════════════════════════════════ */
function PortfolioView({ opp, project, onBack }){
  if(!opp||!project) return null;
  const completedSteps = DEFAULT_STEPS.filter((_,i)=>(project.steps||[])[i]);
  const doneCL = (project.checklist||[]).filter(c=>c.done);
  return (
    <div className="pv-wrap">
      <button className="detail-back" onClick={onBack}>← 돌아가기</button>
      <div className="pv-header">
        <h2>포트폴리오 정리 미리보기</h2>
        <p>아래 내용을 Notion, 피그마, PDF 등으로 옮겨 포트폴리오를 완성해보세요</p>
      </div>
      <div className="pv-card">
        {/* Header */}
        <div className="pv-card-top">
          <div className="pv-card-cat">
            <span className={`tag tag-${opp.category}`} style={{background:'rgba(255,255,255,.2)',color:'#fff'}}>{CAT_LABEL[opp.category]}</span>
            <span style={{fontSize:'11px',opacity:.7}}>{opp.field}</span>
          </div>
          <div className="pv-card-title">{opp.title}</div>
          <div className="pv-card-co">{opp.company}</div>
          <div className="pv-card-dates">{project.startDate} → {project.endDate||'진행중'}</div>
        </div>

        <div className="pv-block">
          <div className="pv-block-title">🎯 내가 한 역할</div>
          <p className="pv-block-text">{project.role||'역할을 기록해보세요 (완료 기록에서 입력 가능)'}</p>
        </div>

        <div className="pv-block">
          <div className="pv-block-title">📋 작업 단계</div>
          {completedSteps.length===0
            ? <p className="pv-block-text" style={{color:'var(--text3)'}}>완료한 단계가 없어요</p>
            : <ul>{completedSteps.map((s,i)=><li key={i}>{s}</li>)}</ul>
          }
        </div>

        {doneCL.length>0 && (
          <div className="pv-block">
            <div className="pv-block-title">✅ 완료한 세부 작업</div>
            <ul>{doneCL.map(c=><li key={c.id}>{c.text}</li>)}</ul>
          </div>
        )}

        {(project.memos||[]).length>0 && (
          <div className="pv-block">
            <div className="pv-block-title">📝 과정 기록</div>
            {project.memos.map(m=>(
              <div key={m.id} className="pv-memo-item">
                <div className="pv-memo-date">{m.date}</div>
                <p className="pv-block-text">{m.text}</p>
              </div>
            ))}
          </div>
        )}

        <div className="pv-block">
          <div className="pv-block-title">🌱 결과</div>
          <p className="pv-block-text">{project.result||'결과를 기록해보세요'}</p>
        </div>

        <div className="pv-block">
          <div className="pv-block-title">💡 배운 점</div>
          <p className="pv-block-text">{project.learnings||'배운 점을 기록해보세요'}</p>
        </div>

        <div className="pv-block">
          <div className="pv-block-title">🎨 얻은 역량</div>
          <div style={{marginBottom:'10px'}}>{opp.skills.map((s,i)=><span key={i} className="skill-chip">{s}</span>)}</div>
          {project.portfolioPoints && <p className="pv-block-text">{project.portfolioPoints}</p>}
        </div>
      </div>
      <div className="pv-note">💡 이 내용을 복사해서 Notion, 피그마, PDF 포트폴리오 등에 붙여넣어 정리해보세요</div>
    </div>
  );
}

/* ═══════════════════════════════════════
   APP (최상위 컴포넌트)
═══════════════════════════════════════ */
function App(){
  const [userId,   setUserId]   = useState(()=>sessionStorage.getItem('oppor-uid')||null);
  const [userGrade, setUserGrade] = useState(()=>Number(sessionStorage.getItem('oppor-grade'))||0);

  /* 메모 + 프로필 로드 */
  useEffect(()=>{
    if(!userId){ setUserMemos([]); setUserProfile(EMPTY_PROFILE); return; }
    db.collection('users').doc(userId).get().then(snap=>{
      if(snap.exists){
        const d=snap.data();
        if(d.memos) setUserMemos(d.memos);
        else if(d.memo) setUserMemos([{text:d.memo, createdAt:new Date().toISOString()}]); // 구버전 호환
        if(d.profile) setUserProfile(d.profile);
      }
    }).catch(()=>{});
  },[userId]);
  const [page,     setPage]     = useState('landing');
  const [exiting,  setExiting]  = useState(false);
  const [detailId, setDetailId] = useState(null);
  const [projId,   setProjId]   = useState(null);
  const [myTab,    setMyTab]    = useState('saved');
  const [userMemos, setUserMemos] = useState([]);
  function handleMemoAdd(text){
    const entry = { text, createdAt: new Date().toISOString() };
    const next = [entry, ...userMemos];
    setUserMemos(next);
    if(userId) db.collection('users').doc(userId).set({ memos: next }, {merge:true}).catch(()=>{});
  }
  function handleMemoDelete(idx){
    const next = userMemos.filter((_,i)=>i!==idx);
    setUserMemos(next);
    if(userId) db.collection('users').doc(userId).set({ memos: next }, {merge:true}).catch(()=>{});
  }
  function handleMemoEdit(idx, text){
    const next = userMemos.map((m,i)=>i===idx?{...m, text, editedAt: new Date().toISOString()}:m);
    setUserMemos(next);
    if(userId) db.collection('users').doc(userId).set({ memos: next }, {merge:true}).catch(()=>{});
  }

  const EMPTY_PROFILE = { grade:'', field:'', category:'', hasPortfolio:'', difficulty:'' };
  const [userProfile, setUserProfile] = useState(EMPTY_PROFILE);
  const profileTimer = React.useRef(null);
  function handleProfileChange(key, val){
    const next = {...userProfile, [key]: val};
    setUserProfile(next);
    if(userId){
      clearTimeout(profileTimer.current);
      profileTimer.current = setTimeout(()=>{
        db.collection('users').doc(userId).set({ profile: next }, {merge:true}).catch(()=>{});
      }, 800);
    }
  }
  const [prevPage, setPrevPage] = useState('explore');
  const [projects, setProjects] = useProjects(userId);
  const [opps,     setOpps]     = useState(DEFAULT_OPPS);

  /* Firestore 공고 로드 — DEFAULT_OPPS를 기준으로 항상 최신 상태 유지
     DEFAULT_OPPS에 추가/수정된 항목은 자동 반영, 관리자가 추가한 항목은 보존 */
  useEffect(()=>{
    db.collection('config').doc('opps').get().then(snap=>{
      const defIds = new Set(DEFAULT_OPPS.map(o=>o.id));
      if(snap.exists && snap.data().list?.length){
        const stored = snap.data().list;
        const storedIds = new Set(stored.map(o=>o.id));
        // 관리자가 직접 추가한 항목 (DEFAULT_OPPS에 없고, 의도적 삭제 목록에도 없는 ID)
        const adminAdded = stored.filter(o=>!defIds.has(o.id)&&!REMOVED_IDS.has(o.id));
        // DEFAULT_OPPS에 새 항목이 추가됐거나 stored에 없는 항목이 있으면 병합
        const needsUpdate = DEFAULT_OPPS.some(o=>!storedIds.has(o.id));
        if(needsUpdate || adminAdded.length){
          const merged = [...DEFAULT_OPPS, ...adminAdded];
          setOpps(merged);
          db.collection('config').doc('opps').set({ list: merged }).catch(()=>{});
        } else {
          // DEFAULT_OPPS의 최신 필드(grade 등)로 기존 항목 업데이트, 삭제된 항목 제외
          const updated = stored
            .filter(o=>!REMOVED_IDS.has(o.id))
            .map(o=>{
              const def = DEFAULT_OPPS.find(d=>d.id===o.id);
              return def ? {...o, ...def} : o;
            });
          setOpps(updated);
          db.collection('config').doc('opps').set({ list: updated }).catch(()=>{});
        }
      } else {
        setOpps(DEFAULT_OPPS);
        db.collection('config').doc('opps').set({ list: DEFAULT_OPPS }).catch(()=>{});
      }
    }).catch(()=>{ setOpps(DEFAULT_OPPS); });
  },[]);

  function saveOpps(list){
    setOpps(list);
    db.collection('config').doc('opps').set({ list }).catch(()=>{});
  }
  function handleAddOpp(opp){ saveOpps([...opps, opp]); }
  function handleDeleteOpp(id){ saveOpps(opps.filter(o=>o.id!==id)); }

  const [showFeatureModal, setShowFeatureModal] = useState(false);
  function handleLogin(id, grade){
    sessionStorage.setItem('oppor-uid', id);
    sessionStorage.setItem('oppor-grade', grade||0);
    setUserId(id);
    setUserGrade(grade||0);
    setShowFeatureModal(true);
  }
  function handleLogout(){
    sessionStorage.removeItem('oppor-uid');
    setUserId(null);
    setPage('landing');
  }

  useEffect(()=>{ window.scrollTo(0,0); },[page]);

  const isAdmin = userId === 'admin';
  if(!userId) return <LoginPage onLogin={handleLogin}/>;

  // 저장·진행 중 공고 수 합산 → Nav 뱃지
  const myCount = Object.values(projects).filter(p=>p.status==='saved').length;

  function nav(p){
    if(exiting) return;
    if(!['detail','project-detail','portfolio'].includes(p)) setPrevPage(p);
    setExiting(true);
    setTimeout(()=>{
      setPage(p); setExiting(false);
    }, 270);
  }

  /* 저장 토글 */
  function handleSave(id){
    setProjects(prev=>{
      if(prev[id]?.status==='saved'){ const n={...prev}; delete n[id]; return n; }
      return {...prev,[id]:{status:'saved'}};
    });
  }

  /* 시작하기 */
  function handleStart(id){
    setProjects(prev=>({
      ...prev,[id]:{
        status:'inprogress',
        steps:[false,false,false,false,false],
        checklist:[],memos:[],attachments:[],
        portfolioPoints:'',startDate:today(),
        role:'',result:'',learnings:'',
      }
    }));
    setProjId(id); nav('project-detail');
  }

  /* 상세 열기 */
  function openDetail(opp){ setDetailId(opp.id); nav('detail'); }

  /* 프로젝트 상세 열기 */
  function openProgress(id){ setProjId(id); nav('project-detail'); }

  /* 프로젝트 업데이트 */
  function updateProject(updater){
    setProjects(prev=>({...prev,[projId]:updater(prev[projId])}));
  }

  /* 완료로 이동 */
  function archiveProject(data){
    setProjects(prev=>({
      ...prev,[projId]:{...prev[projId],status:'archived',endDate:today(),...data}
    }));
    setMyTab('archive'); nav('mypage');
  }

  /* 저장 취소 */
  function unsave(id){
    setProjects(prev=>{ const n={...prev}; delete n[id]; return n; });
  }

  const detailOpp    = opps.find(o=>o.id===detailId);
  const projOpp      = opps.find(o=>o.id===projId);
  const projData     = projects[projId];

  return (
    <div>
      <Nav page={page} onNav={nav} myCount={myCount} userId={userId} onLogout={handleLogout} isAdmin={isAdmin}/>
      <CreditBanner/>
      <DeadlineBanner opps={opps} projects={projects} onOpenDetail={openDetail}/>
      {showFeatureModal && <FeatureModal onClose={()=>setShowFeatureModal(false)}/>}

      <div key={page} className={exiting ? 'page-exit' : 'page-enter'}>
        {page==='landing' && (
          <LandingPage onExplore={()=>nav('explore')} onMyPage={()=>nav('mypage')}/>
        )}
        {page==='explore' && (
          <ExplorePage opps={opps} projects={projects} onSave={handleSave} onOpenDetail={openDetail} userGrade={userGrade}/>
        )}
        {page==='detail' && (
          <DetailPage opp={detailOpp} project={projects[detailId]}
            onBack={()=>nav(prevPage)} onSave={handleSave} opps={opps}
            onStart={handleStart} onOpenProgress={openProgress} onOpenDetail={openDetail}/>
        )}
        {page==='mypage' && (
          <MyPage opps={opps} projects={projects}
            onOpenDetail={openDetail} onUnsave={unsave}
            memos={userMemos} onMemoAdd={handleMemoAdd} onMemoDelete={handleMemoDelete} onMemoEdit={handleMemoEdit}
            profile={userProfile} onProfileChange={handleProfileChange}/>
        )}
        {page==='admin' && isAdmin && (
          <AdminPage opps={opps} onAdd={handleAddOpp} onDelete={handleDeleteOpp}/>
        )}
      </div>

      <footer>
        <div>
          <strong style={{display:'inline-flex',alignItems:'center',gap:'6px'}}>
            <svg width="18" height="14" viewBox="0 0 20 16" fill="none" xmlns="http://www.w3.org/2000/svg" style={{display:'block',opacity:.85}}>
              <rect x="0" y="11" width="20" height="5" rx="2.5" fill="white" opacity="0.18"/>
              <ellipse cx="10" cy="11" rx="7.5" ry="3.5" fill="white" opacity="0.55"/>
              <line x1="10" y1="11" x2="10" y2="4" stroke="white" strokeWidth="1.4" strokeLinecap="round"/>
              <path d="M10 4 C7 2 4 3 3.5 5" stroke="white" strokeWidth="1.3" strokeLinecap="round" fill="none"/>
              <path d="M10 4 C13 2 16 3 16.5 5" stroke="white" strokeWidth="1.3" strokeLinecap="round" fill="none"/>
              <path d="M10 4 C10 1.5 11.5 0.5 13 1" stroke="white" strokeWidth="1.3" strokeLinecap="round" fill="none"/>
            </svg>
            Oppor
          </strong>
          <small>디자인 전공 대학생을 위한 기회 탐색 · 준비 · 기록 플랫폼 | 미디어 수업 프로토타입</small>
        </div>
        <div style={{textAlign:'right'}}>
          <small>실제 지원은 각 공고의 공식 링크를 통해서만 이루어집니다</small>
          <small>이 사이트는 프로토타입으로 실제 채용 플랫폼이 아닙니다</small>
        </div>
      </footer>
    </div>
  );
}

/* ── Mount ── */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
